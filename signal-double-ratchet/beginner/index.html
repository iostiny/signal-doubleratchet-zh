<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Double Ratchet · 零基础渐进教程</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Phycat-Cherry 渐进教程主题
   ============================================================ */
:root {
  --bg-page:        #fdfaf6;
  --bg-card:        #ffffff;
  --bg-soft-pink:   #fce4e4;

  --text-primary:   #1f2937;
  --text-secondary: #6b7280;
  --text-muted:     #9ca3af;

  --cherry:         #aa1141;
  --cherry-deep:    #9a0036;
  --cherry-soft:    #ffa6a6;
  --cherry-pink:    #ea68b6;
  --cherry-glass:   #fce4e4;

  --teal:           #0e7490;
  --teal-soft:      #cffafe;
  --amber:          #b45309;
  --amber-soft:     #fef3c7;
  --green:          #15803d;
  --green-soft:     #dcfce7;
  --violet:         #6d28d9;
  --violet-soft:    #ede9fe;
  --slate:          #475569;
  --slate-soft:     #f1f5f9;
  --red-deep:       #b91c1c;
  --red-soft:       #fee2e2;

  --rule:           #e5e7eb;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', 'JetBrains Mono', -apple-system, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.6;
}

/* ============== App layout ============== */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}

/* ============== Sidebar / stepper ============== */
.sidebar {
  background: var(--bg-card);
  border-right: 1px solid var(--rule);
  padding: 1.6rem 1.2rem;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  align-self: start;
}
.brand {
  font-size: 1rem;
  font-weight: 700;
  color: var(--cherry-deep);
  margin-bottom: 0.3rem;
  letter-spacing: -0.01em;
}
.brand-sub {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 1.6rem;
}
.chap {
  margin-bottom: 1rem;
  cursor: pointer;
}
.chap-name {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.45rem;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.chap-name .num {
  font-family: 'JetBrains Mono', monospace;
  color: var(--cherry);
  font-size: 0.7rem;
}
.dots { display: flex; gap: 6px; }
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--rule);
  cursor: pointer;
  transition: all 0.2s ease;
}
.dot:hover { transform: scale(1.25); }
.dot.read { background: var(--cherry-soft); }
.dot.active {
  background: var(--cherry);
  box-shadow: 0 0 0 3px var(--cherry-glass);
}

/* ============== Stage ============== */
.stage {
  display: flex;
  flex-direction: column;
  padding: 1.4rem 2rem 2rem;
  gap: 0.9rem;
  min-width: 0;
}

/* Header */
.header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
}
.header-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--cherry-deep);
}
.header-ch {
  padding: 3px 10px;
  background: var(--cherry-glass);
  color: var(--cherry-deep);
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
}
.header-counter {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* SVG stage */
.svg-wrap {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 12px;
  box-shadow: 0 1px 3px rgba(170,17,65,0.04);
  padding: 1rem 1.2rem;
  position: relative;
}
.chapter-svg {
  width: 100%;
  height: auto;
  max-height: 68vh;
  display: none;
}
.chapter-svg.active { display: block; }

/* SVG element visibility — controlled by data-step */
[data-step] {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 320ms ease, transform 320ms ease;
  pointer-events: none;
}
[data-step].visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* Caption card */
.caption {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-left: 4px solid var(--cherry);
  border-radius: 10px;
  padding: 0.85rem 1.1rem;
  min-height: 78px;
}
.caption-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--cherry-deep);
  margin-bottom: 0.25rem;
}
.caption-body {
  font-size: 0.85rem;
  color: var(--text-primary);
  line-height: 1.55;
}
.caption-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82em;
  background: var(--cherry-glass);
  color: var(--cherry-deep);
  padding: 1px 5px;
  border-radius: 4px;
}
.caption-body em {
  font-style: normal;
  color: var(--text-muted);
  font-size: 0.78em;
  margin-left: 0.3em;
}

/* Deep-dive: references + rust code */
.extras {
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}
.extras:empty { display: none; }
.extras.two-col {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
}
@media (max-width: 1100px) {
  .extras.two-col { grid-template-columns: 1fr; }
}
.extras-card {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 0.9rem 1.1rem;
  font-size: 0.82rem;
}
.extras-card.refs { border-left: 3px solid var(--violet); }
.extras-card.code { border-left: 3px solid var(--green); padding: 0; overflow: hidden; }
.extras-card h4 {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
  margin-bottom: 0.55rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.extras-card.refs h4 { color: var(--violet); }
.extras-card.code h4 {
  color: var(--green);
  padding: 0.7rem 1rem 0.4rem;
  margin-bottom: 0;
}
.extras-card.refs ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.extras-card.refs li {
  font-size: 0.8rem;
  line-height: 1.45;
}
.extras-card.refs a {
  color: var(--cherry-deep);
  text-decoration: none;
  border-bottom: 1px dashed var(--cherry-pink);
}
.extras-card.refs a:hover {
  color: var(--cherry);
  border-bottom-style: solid;
}
.extras-card.refs .ref-note {
  color: var(--text-muted);
  font-size: 0.72rem;
  margin-left: 0.4em;
}
.extras-card.code pre {
  margin: 0;
  padding: 0.4rem 1rem 0.9rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.74rem;
  line-height: 1.55;
  color: var(--text-primary);
  overflow-x: auto;
  white-space: pre;
  background: linear-gradient(to bottom, #ffffff, #fafff7);
}
.extras-card.code .kw { color: var(--violet); font-weight: 600; }
.extras-card.code .ty { color: var(--teal); }
.extras-card.code .fn { color: var(--cherry); }
.extras-card.code .cm { color: var(--text-muted); font-style: italic; }
.extras-card.code .str { color: var(--amber); }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
}
.controls button {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 8px 18px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.15s ease;
}
.controls button:hover:not(:disabled) {
  border-color: var(--cherry);
  color: var(--cherry-deep);
  background: var(--cherry-glass);
}
.controls button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.controls button.primary {
  background: var(--cherry);
  color: white;
  border-color: var(--cherry);
}
.controls button.primary:hover:not(:disabled) {
  background: var(--cherry-deep);
  color: white;
}
.controls button.ghost {
  border: none;
  color: var(--text-muted);
}
.controls .hint {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-left: 0.8rem;
}

/* ============== Common SVG styles ============== */
.svg-text { font-family: 'Noto Sans SC', sans-serif; }
.svg-mono { font-family: 'JetBrains Mono', monospace; }

/* Reusable SVG classes */
.actor-cherry { fill: var(--cherry-glass); stroke: var(--cherry); }
.actor-teal   { fill: var(--teal-soft); stroke: var(--teal); }
.actor-red    { fill: var(--red-soft); stroke: var(--red-deep); }
.actor-violet { fill: var(--violet-soft); stroke: var(--violet); }
.actor-amber  { fill: var(--amber-soft); stroke: var(--amber); }
.actor-green  { fill: var(--green-soft); stroke: var(--green); }

.label-cherry { fill: var(--cherry-deep); }
.label-teal   { fill: var(--teal); }
.label-red    { fill: var(--red-deep); }
.label-violet { fill: var(--violet); }
.label-amber  { fill: var(--amber); }
.label-green  { fill: var(--green); }
.label-slate  { fill: var(--slate); }
.label-muted  { fill: var(--text-muted); }

/* Sub-step animations: pulse for emphasis */
@keyframes pulse-glow {
  0%, 100% { filter: drop-shadow(0 0 0 transparent); }
  50% { filter: drop-shadow(0 0 6px var(--cherry-soft)); }
}
.pulse { animation: pulse-glow 2.4s ease infinite; }

/* Responsive */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sidebar { display: none; }
  .stage { padding: 1rem; }
}
</style>
</head>
<body>
<div class="app">
  <!-- ============== Sidebar ============== -->
  <aside class="sidebar">
    <div class="brand">🐣 Double Ratchet</div>
    <div class="brand-sub">零基础渐进教程 · 25 步</div>

    <div class="chap" data-ch="1">
      <div class="chap-name"><span class="num">CH1</span> 为什么要加密</div>
      <div class="dots" data-ch-dots="1"></div>
    </div>
    <div class="chap" data-ch="2">
      <div class="chap-name"><span class="num">CH2</span> 单条消息</div>
      <div class="dots" data-ch-dots="2"></div>
    </div>
    <div class="chap" data-ch="3">
      <div class="chap-name"><span class="num">CH3</span> 多条消息：KDF 链</div>
      <div class="dots" data-ch-dots="3"></div>
    </div>
    <div class="chap" data-ch="4">
      <div class="chap-name"><span class="num">CH4</span> 双向对话：DH ratchet</div>
      <div class="dots" data-ch-dots="4"></div>
    </div>
    <div class="chap" data-ch="5">
      <div class="chap-name"><span class="num">CH5</span> 首次握手：X3DH</div>
      <div class="dots" data-ch-dots="5"></div>
    </div>
    <div class="chap" data-ch="6">
      <div class="chap-name"><span class="num">CH6</span> 全景回顾</div>
      <div class="dots" data-ch-dots="6"></div>
    </div>
  </aside>

  <!-- ============== Stage ============== -->
  <main class="stage">
    <header class="header">
      <span class="header-ch" id="header-ch">CH1</span>
      <h1 class="header-title" id="header-title">为什么要加密</h1>
      <span class="header-counter" id="header-counter">Step 1 / 25</span>
    </header>

    <section class="svg-wrap">

      <!-- ============================================================
           Ch1 — 为什么要加密
           ============================================================ -->
      <svg class="chapter-svg" data-ch="1" viewBox="0 0 1100 520" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arr-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
          </marker>
          <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
          </marker>
        </defs>

        <!-- Alice -->
        <g data-step="1">
          <circle cx="140" cy="240" r="44" class="actor-cherry" stroke-width="2"/>
          <text x="140" y="246" text-anchor="middle" font-size="22" font-weight="700" class="label-cherry">A</text>
          <text x="140" y="305" text-anchor="middle" font-size="14" font-weight="600" class="label-cherry">Alice</text>
        </g>

        <!-- Bob -->
        <g data-step="1">
          <circle cx="960" cy="240" r="44" class="actor-teal" stroke-width="2"/>
          <text x="960" y="246" text-anchor="middle" font-size="22" font-weight="700" class="label-teal">B</text>
          <text x="960" y="305" text-anchor="middle" font-size="14" font-weight="600" class="label-teal">Bob</text>
        </g>

        <!-- Arrow Alice -> Bob -->
        <g data-step="1">
          <line x1="190" y1="240" x2="910" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arr-slate)"/>
        </g>

        <!-- Plaintext bubble (step 1 only) -->
        <g data-step="1" data-step-end="1">
          <rect x="430" y="200" width="240" height="44" rx="8" fill="#fff" stroke="#475569" stroke-width="1.5"/>
          <text x="550" y="227" text-anchor="middle" font-size="14" class="label-slate" font-weight="500">"Hi Bob! 转账 1000"</text>
        </g>

        <!-- Eve always shown from step 1 -->
        <g data-step="1">
          <circle cx="550" cy="430" r="36" class="actor-red" stroke-width="2"/>
          <text x="550" y="436" text-anchor="middle" font-size="18" font-weight="700" class="label-red">E</text>
          <text x="550" y="488" text-anchor="middle" font-size="13" font-weight="600" class="label-red">Eve · 偷听者</text>
          <line x1="550" y1="244" x2="550" y2="394" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4 4"/>
        </g>

        <!-- Eve's plaintext bubble (step 1 only) -->
        <g data-step="1" data-step-end="1">
          <rect x="620" y="408" width="200" height="34" rx="6" fill="#fff" stroke="#b91c1c" stroke-width="1.5"/>
          <text x="720" y="430" text-anchor="middle" font-size="12" class="label-red" font-weight="500">"Hi Bob! 转账 1000" 👀</text>
        </g>

        <!-- Step 2: shared key K on both sides -->
        <g data-step="2">
          <!-- Alice's key -->
          <rect x="100" y="320" width="80" height="28" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
          <text x="140" y="339" text-anchor="middle" font-size="13" font-weight="600" class="label-amber">🔑 K</text>
          <!-- Bob's key -->
          <rect x="920" y="320" width="80" height="28" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
          <text x="960" y="339" text-anchor="middle" font-size="13" font-weight="600" class="label-amber">🔑 K</text>
        </g>

        <!-- Step 2: ciphertext bubble -->
        <g data-step="2">
          <rect x="430" y="200" width="240" height="44" rx="8" fill="#fce4e4" stroke="#aa1141" stroke-width="1.5"/>
          <text x="550" y="220" text-anchor="middle" font-size="11" class="label-muted" font-weight="500">密文（用 K 加密）</text>
          <text x="550" y="237" text-anchor="middle" font-size="13" class="svg-mono label-cherry" font-weight="600">x9F2cA7e1b3...</text>
        </g>

        <!-- Step 2: Eve sees garbage -->
        <g data-step="2">
          <rect x="620" y="408" width="200" height="34" rx="6" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>
          <text x="720" y="430" text-anchor="middle" font-size="12" class="label-muted svg-mono">???? 看不懂</text>
        </g>

        <!-- Hint text top -->
        <g data-step="1" data-step-end="1">
          <text x="550" y="60" text-anchor="middle" font-size="13" class="label-muted">网络上传的内容，谁都能监听</text>
        </g>
        <g data-step="2" data-step-end="2">
          <text x="550" y="60" text-anchor="middle" font-size="13" class="label-muted">双方共享一把密钥 K，加密后 Eve 看到的是乱码</text>
        </g>
      </svg>

      <!-- ============================================================
           Ch2 — 单条消息怎么加密
           ============================================================ -->
      <svg class="chapter-svg" data-ch="2" viewBox="0 0 1100 520" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arr-slate2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
          </marker>
          <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
          </marker>
        </defs>

        <!-- Alice & Bob (always shown from step 3) -->
        <g data-step="3">
          <circle cx="120" cy="180" r="40" class="actor-cherry" stroke-width="2"/>
          <text x="120" y="186" text-anchor="middle" font-size="20" font-weight="700" class="label-cherry">A</text>
          <text x="120" y="240" text-anchor="middle" font-size="13" font-weight="600" class="label-cherry">Alice</text>

          <circle cx="980" cy="180" r="40" class="actor-teal" stroke-width="2"/>
          <text x="980" y="186" text-anchor="middle" font-size="20" font-weight="700" class="label-teal">B</text>
          <text x="980" y="240" text-anchor="middle" font-size="13" font-weight="600" class="label-teal">Bob</text>
        </g>

        <!-- Step 3: K with question mark -->
        <g data-step="3" data-step-end="3">
          <rect x="80" y="270" width="80" height="28" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
          <text x="120" y="289" text-anchor="middle" font-size="13" font-weight="600" class="label-amber">🔑 K</text>
          <path d="M 170 284 Q 540 200, 940 284" stroke="#b91c1c" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arr-red)"/>
          <text x="540" y="190" text-anchor="middle" font-size="14" class="label-red" font-weight="600">❓ 怎么把 K 传给 Bob？</text>
          <text x="540" y="212" text-anchor="middle" font-size="11" class="label-muted">直接发，Eve 也会截到</text>
        </g>

        <!-- Step 4: public/private keypair -->
        <g data-step="4">
          <!-- Alice's keypair -->
          <rect x="30" y="278" width="200" height="92" rx="8" fill="#fff" stroke="#aa1141" stroke-width="1.5"/>
          <text x="130" y="298" text-anchor="middle" font-size="11" class="label-cherry" font-weight="600">Alice 的密钥对</text>
          <text x="130" y="322" text-anchor="middle" font-size="12" class="svg-mono label-cherry">🔒 私钥 a　<tspan font-size="9" class="label-muted">(本地)</tspan></text>
          <text x="130" y="350" text-anchor="middle" font-size="12" class="svg-mono label-cherry">📢 公钥 A = g^a　<tspan font-size="9" class="label-muted">(可公开)</tspan></text>

          <!-- Bob's keypair -->
          <rect x="870" y="278" width="200" height="92" rx="8" fill="#fff" stroke="#0e7490" stroke-width="1.5"/>
          <text x="970" y="298" text-anchor="middle" font-size="11" class="label-teal" font-weight="600">Bob 的密钥对</text>
          <text x="970" y="322" text-anchor="middle" font-size="12" class="svg-mono label-teal">🔒 私钥 b　<tspan font-size="9" class="label-muted">(本地)</tspan></text>
          <text x="970" y="350" text-anchor="middle" font-size="12" class="svg-mono label-teal">📢 公钥 B = g^b　<tspan font-size="9" class="label-muted">(可公开)</tspan></text>
        </g>

        <!-- Step 5: ECDH cross-multiply (only step 5) -->
        <g data-step="5" data-step-end="5">
          <!-- Alice computes a×B -->
          <line x1="870" y1="350" x2="240" y2="350" stroke="#aa1141" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arr-red)"/>
          <text x="555" y="343" text-anchor="middle" font-size="11" class="label-cherry">Alice 收到 B</text>
          <!-- Bob computes b×A -->
          <line x1="230" y1="320" x2="860" y2="320" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arr-slate2)"/>
          <text x="555" y="313" text-anchor="middle" font-size="11" class="label-teal">Bob 收到 A</text>

          <!-- Central equation -->
          <rect x="370" y="92" width="360" height="140" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
          <text x="550" y="116" text-anchor="middle" font-size="12" class="label-green" font-weight="700">ECDH · 椭圆曲线 Diffie-Hellman</text>
          <text x="550" y="148" text-anchor="middle" font-size="15" class="svg-mono label-green" font-weight="700">Alice: a × B = ab</text>
          <text x="550" y="175" text-anchor="middle" font-size="15" class="svg-mono label-green" font-weight="700">Bob:　 b × A = ab</text>

<script>

const STEPS = [
  // Ch1
  { ch: 1, title: '明文裸奔', body: 'Alice 想悄悄给 Bob 发条消息，但他们之间隔着一整个互联网 —— 路由器、ISP、咖啡馆 WiFi …… 任何一个环节都能把内容看个清楚。<br>左下角的 Eve 就是这类"偷听者"的代表。问题是：网络上怎么传，才能让只有 Bob 能看懂？' },
  { ch: 1, title: '引入对称密钥 K', body: '最朴素的想法：双方共享一把『密钥 K』，用 K 把明文搅成乱码再发出去，Bob 用同样的 K 还原。<br>这套机制叫 <code>对称加密</code>（AES、ChaCha20 都属此类）。Eve 即使截到 <code>x9F2cA7...</code>，没 K 也读不懂。<br>但下一个问题立刻冒出来：<strong>这把 K，从哪来？怎么传给 Bob？</strong>' },
  // Ch2
  { ch: 2, title: '密钥分发难题', body: '如果 Alice 直接把 K 通过网络发给 Bob，Eve 顺手就截下了 —— 接下来 Eve 就能解密一切。<br>"安全地传递密钥本身"竟然比"加密消息"更难。这就是经典的 <code>密钥分发难题</code>（key distribution problem）。<br>密码学家苦思了几十年。直到 1976 年，Diffie 和 Hellman 给出了一个反直觉的答案 ▶' },
  { ch: 2, title: '公私钥对', body: '革命性的想法：每个人有 <strong>一对</strong> 密钥。<br>• <code>私钥</code>（小写 a / b）：保存在本地，永远不离开设备。<br>• <code>公钥</code>（大写 A / B）：可以公开发布，贴在哪儿都行。<br>两把钥匙数学上相关，但从公钥反推私钥需要破解离散对数问题 —— 实际上算不出来。' },
  { ch: 2, title: 'ECDH · 算出同一个秘密', body: '<code>DH (Diffie-Hellman) · 密钥协商协议</code> 的魔法 —— 1976 年发明，让两人在公开信道上协商出一个只有他们俩知道的秘密：<br>• Alice 用『自己的私钥 a × Bob 的公钥 B』算出 <code>aB = ab</code>。<br>• Bob 用『自己的私钥 b × Alice 的公钥 A』算出 <code>bA = ab</code>。<br>双方得到同一个 <code>ab</code> ✓ —— 而 Eve 只看到 A 和 B 在网络上飞，没有任何一方的私钥，算不出 <code>ab</code>。<br><em>ECDH = Elliptic-Curve DH，椭圆曲线版本的 DH，更快更安全，Signal 用的就是它（曲线 Curve25519）</em>' },
  { ch: 2, title: '用 ab 当密钥', body: '完美：<code>ab</code> 派生出对称密钥 K，K 加密第 1 条消息。Alice 和 Bob 都能算出 K，Eve 算不出。<br><br>但 …… 还有隐患：如果 Alice 和 Bob 每次会话都用同一对 (a, A) (b, B)，那 <code>ab</code> 永远是同一个值。一旦私钥某天被偷，攻击者拿出过去截到的所有密文，全部解开。<br>下一章解决：怎么让每条消息都用不同的密钥？' },
  // Ch3
  { ch: 3, title: '复用 K 的风险', body: 'Alice 用同一把 K 加密 M₁、M₂、M₃ …… 100 条消息。<br>看起来没问题 —— 直到某天 K 泄漏。攻击者过去保存的所有密文一夜之间全部沦陷。<br>这就是"密钥复用"的诅咒。我们需要：<strong>每条消息用一把全新的密钥，过去的密钥即使泄漏也不影响未来。</strong>' },
  { ch: 3, title: 'KDF · 单向搅拌机', body: '解决方案的核心工具是 <code>KDF (Key Derivation Function) · 密钥派生函数</code>。在 Signal 里实际由 <code>HMAC-SHA256</code> 实现 —— <code>HMAC = Hash-based Message Authentication Code · 基于哈希的消息认证码</code>，本质是一个带密钥的哈希函数。<br>KDF 有两个关键属性：<br>① 喂进一个输入，吐出两个独立的输出（甚至更多）。<br>② 严格 <strong>单向</strong>：从输出无论如何也算不回输入。<br>这把"不可逆"是接下来一切安全保证的基石。' },
  { ch: 3, title: '把 KDF 串成链', body: '现在把 KDF 串起来。引入两个新的术语：<br>• <code>CK = Chain Key · 链密钥</code>：用来"驱动这条链"往前走的密钥，本身从不直接加密消息。<br>• <code>MK = Message Key · 消息密钥</code>：派生出来加密<strong>具体某一条消息</strong>的密钥，用完即弃。<br>链的工作方式：<br>• 初始有一个 <code>CK₁</code>。<br>• <code>CK₁ → KDF → (CK₂, MK₁)</code>：吐出"下一个链密钥 CK₂"和"这条消息的密钥 MK₁"。<br>• 用 <code>MK₁</code> 加密 M₁；扔掉 MK₁ 永不复用。<br>• 接着 <code>CK₂ → KDF → (CK₃, MK₂)</code>，加密 M₂ ……<br>这条链叫 <code>Symmetric Ratchet · 对称棘轮</code>。每条消息都有专属的一次性密钥。' },
  { ch: 3, title: '✅ Forward Secrecy', body: '设想攻击者在第 3 步抓到 <code>CK₃</code>。能做什么？<br>• 往后：用 KDF 算出 CK₄、CK₅、CK₆ …… 解密未来消息。<br>• 往回：试图算 CK₂、CK₁。<strong>算不出来 —— KDF 是单向的</strong>。<br>所以 M₁、M₂ 仍然安全。这个性质叫 <code>前向保密 Forward Secrecy (FS)</code>：<br><em>"被入侵的那一刻，过去的消息仍是安全的。"</em>' },
  // Ch4
  { ch: 4, title: '⚠️ 但缺少 PCS', body: 'FS 解决了"过去"，但"未来"呢？<br>攻击者偷到 CK₃ 后，用 KDF 一直往前算 → CK₄ → CK₅ → CK₆ …… 全都能算出来。<strong>未来所有消息持续被破</strong>。<br>这意味着：一次入侵 = 永久监控。我们需要另一种保证：<br><code>Post-Compromise Security (PCS) · 后向恢复</code>：即使现在被入侵，过几次轮换后还能重新安全。' },
  { ch: 4, title: '注入新 DH · 重启', body: '思路：每隔一段时间，双方做一次<strong>新的 DH 公钥交换</strong>，把新出来的随机性注入到 <code>root key</code>（简称 <code>RK = Root Key · 根密钥</code>，是整个会话的主时间线，所有 CK 都从它派生出来）。<br>新的 DH 输出对攻击者来说完全不可预测 —— 即使他偷了旧 CK，也无法跟上新 DH 后派生出的新 CK 链。<br>几次新 DH 之后，攻击者就被甩开了。这就是 PCS 的来源。<br><em>"棘轮 (ratchet)" 一词来自机械：只能往前推，不能倒回。</em>' },
  { ch: 4, title: 'Ping-pong 公钥交换', body: '具体怎么"做新 DH"？<br>• Alice 发消息时附带<strong>她的新公钥 A₁</strong>。<br>• Bob 收到，用自己的私钥 b₀ 和 A₁ 算 DH，更新自己的 root key；回复时也附上<strong>Bob 的新公钥 B₁</strong>。<br>• Alice 收到 B₁，再做一次 DH，又更新 root key …… 如此交替。<br>每次"往返"都重新注入新鲜性。这种交替模式就是 <code>ping-pong</code>。' },
  { ch: 4, title: 'DH × RK → 新 RK + 新 CK', body: '具体派生公式：<br><code>(new RK, new CK) = KDF(DH_output, current RK)</code><br>• <strong>新 RK</strong>：等下一次 DH 时再喂进去。这条链叫 <code>root chain</code>，是整个会话的主时间线。<br>• <strong>新 CK</strong>：扔回 Ch3 那条 KDF 链，继续派生出 MK 加密消息。<br>每次 DH ratchet 推进，都会"换上一条全新的 CK 链"。' },
  { ch: 4, title: 'Double Ratchet 全景', body: '完整图景：<br>① <strong>root chain</strong>（amber）：每次新 DH 推进一格，是主线。<br>② <strong>sending chain</strong>（cherry）：Alice 每发一条消息推进一格，派生 MK 加密。<br>③ <strong>receiving chain</strong>（teal）：Alice 每收到 Bob 一条消息推进一格，派生 MK 解密。<br>双方的 sending 和 receiving 是对称镜像的。<br>"双棘轮" = 一条 DH 棘轮（垂直） + 两条对称棘轮（水平）。' },
  // Ch5
  { ch: 5, title: '挑战：Bob 离线', body: '前面所有 DH 都假设双方能<strong>同时在线交换公钥</strong>。<br>但现实里 Bob 可能在睡觉、在地铁、关机、被全村断网 …… Alice 总不能等他回来才发吧？<br>需要一个机制让 Alice 单方面就能完成首次密钥协商。<br>这就是 <code>X3DH · Extended Triple Diffie-Hellman</code> 要解决的问题。' },
  { ch: 5, title: 'Bob 提前上传 IK + SPK', body: 'Bob 在<strong>注册时</strong>（不需要在线）就把两类公钥上传到 Server：<br>• <code>IK_B</code>（Identity Key 身份密钥）：长期不变，代表"我是 Bob"。<br>• <code>SPK_B</code>（Signed Pre-Key 签名预共享密钥）：定期轮换（一般几周到几个月），并由 IK_B 签名 —— 防止 Server 偷偷换成别的公钥。<br>这两个公钥就长期挂在服务器上，等任何人来要。' },
  { ch: 5, title: '+ OPK 一次性密钥池', body: 'Bob 还会预先生成<strong>一池子</strong>『一次性密钥 OPK』（One-Time Pre-Key），比如 100 个，全部批量上传。<br>每个 OPK 只用一次：谁来要走一个，Server 就从池里删掉一个。<br>OPK 池快空了，Bob 下次上线时再补充上传。<br>OPK 是 X3DH 提供"后向恢复"的关键来源 —— 每次会话都有一个新鲜的、不可预测的密钥参与。' },
  { ch: 5, title: 'Alice 取走三件套', body: 'Alice 想第一次给 Bob 发消息时：<br>① 向 Server 请求 Bob 的密钥包。<br>② Server 返回 <code>(IK_B, SPK_B, OPK_B)</code> 三件套，并<strong>原子地</strong>把这个 OPK 从池里删掉。<br>③ 下次别人来要 Bob 的密钥包，会拿到不同的 OPK，<strong>永远不会重复</strong>。<br>Alice 同时验证 SPK_B 上的 Bob 签名，确认没被 Server 调包。' },
  { ch: 5, title: 'Alice 做 4 个 DH', body: 'Alice 自己有：长期身份 <code>IK_A</code> + 一次性短暂密钥 <code>EK_A</code>（Ephemeral Key，本次会话专用）。<br>结合 Bob 的三件套，Alice 做 <strong>4 次 ECDH</strong>：<br>• DH₁ = IK_A × SPK_B → 绑定身份<br>• DH₂ = EK_A × IK_B → 绑定 Bob 身份<br>• DH₃ = EK_A × SPK_B → 提供新鲜性<br>• DH₄ = EK_A × OPK_B → 提供后向恢复<br>4 个 DH 拼接 —— 任何一个密钥泄漏都不足以破整个握手。' },
  { ch: 5, title: '→ SharedSecret → RK₀', body: '4 个 DH 输出拼接 <code>DH₁‖DH₂‖DH₃‖DH₄</code>，喂进 KDF，得到 <code>SharedSecret</code>。<br>SharedSecret 就是 Double Ratchet 的初始 <code>RK₀</code>。<br>从此刻起，Alice 和 Bob 共享一个 root key —— 接着进入 Ch4 描述的 ping-pong：每条消息都附带新公钥，root chain 不断推进。<br><strong>X3DH 是"起跑发令枪"，Double Ratchet 是"长跑本身"。</strong>' },
  // Ch6
  { ch: 6, title: '全景时序', body: '把整个故事压缩成一张时序图：<br>① Bob 注册时上传 IK + SPK + OPK 池<br>② Alice 想发消息 → 向 Server 请求 Bob 的密钥包<br>③ Server 返回三件套（OPK 出队）<br>④ Alice 在本地做 X3DH → 得到 SharedSecret = RK₀<br>⑤ Alice 用 RK₀ 派生 CK 加密第 1 条，连同自己的公钥一起发<br>⑥ Server 暂存，等 Bob 上线后转发<br>⑦ Bob 上线后做镜像 X3DH 推出同一个 RK₀，解密；回复时 Double Ratchet ping-pong 启动' },
  { ch: 6, title: '数据可见性边界', body: 'Server 在整个流程中能看到什么？<br>• ✓ 公钥（IK、SPK、OPK 都是设计上公开的）<br>• ✓ 密文（要转发啊）<br>• ✓ 元数据：谁在跟谁聊、什么时候<br>• ✗ 任何私钥<br>• ✗ SharedSecret / RK / CK / MK<br>• ✗ 任何明文<br>这就是端到端加密的边界。元数据隐私是另一个问题，需要 <code>Sealed Sender</code> 等额外机制。' },
  { ch: 6, title: 'FS 和 PCS', body: 'Signal 提供的两个核心安全保证：<br>① <strong>Forward Secrecy (前向保密)</strong>：现在被入侵，<strong>过去</strong>的消息仍安全。来自 KDF 链的单向性（Ch3）。<br>② <strong>Post-Compromise Security (后向恢复)</strong>：现在被入侵，<strong>未来</strong>过几次 DH 后重新安全。来自 DH ratchet 注入的新鲜性（Ch4）。<br>这两个性质是 Signal 区别于一般加密通信的关键 —— 即使长期密钥泄漏，损失也是有边界的。' },

function renderExtras(step) {
  const el = document.getElementById('extras');
  const extra = STEP_EXTRAS[step] || {};
  let html = '';

  if (extra.refs && extra.refs.length) {
    html += '<div class="extras-card refs"><h4>📚 延伸阅读 · 原理出处</h4><ul>';
    for (const r of extra.refs) {
      const note = r.note ? `<span class="ref-note">— ${r.note}</span>` : '';
      html += `<li><a href="${r.url}" target="_blank" rel="noopener">${r.title}</a>${note}</li>`;
    }
    html += '</ul></div>';
  }

  if (extra.code) {
    html += `<div class="extras-card code"><h4>🦀 Rust 骨架</h4><pre>${extra.code}</pre></div>`;
  }

  // Single-card → stretch full width; both cards → keep 2-col grid
  el.classList.toggle('two-col', !!(extra.refs && extra.refs.length && extra.code));
  el.innerHTML = html;
}

// Build dots in sidebar
function buildDots() {
  const groups = {};
  STEPS.forEach((s, i) => {
    (groups[s.ch] ||= []).push(i + 1);
  });
  Object.entries(groups).forEach(([ch, steps]) => {
    const wrap = document.querySelector(`.dots[data-ch-dots="${ch}"]`);
    if (!wrap) return;
    steps.forEach(n => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.dataset.step = n;
      d.title = `Step ${n}`;
      d.addEventListener('click', () => goTo(n));
      wrap.appendChild(d);
    });
  });
}

let currentStep = 1;

function goTo(step) {
  step = Math.max(1, Math.min(TOTAL, step));
  currentStep = step;
  const cur = STEPS[step - 1];

  // Activate the right chapter SVG
  document.querySelectorAll('.chapter-svg').forEach(svg => {
    svg.classList.toggle('active', +svg.dataset.ch === cur.ch);
  });

  // Apply visibility to all data-step elements
  document.querySelectorAll('[data-step]').forEach(el => {
    const start = +el.dataset.step;
    const end = el.dataset.stepEnd ? +el.dataset.stepEnd : 999;
    const visible = step >= start && step <= end;
    // Defer to next frame so transition triggers
    requestAnimationFrame(() => el.classList.toggle('visible', visible));
  });

  // Update header
  document.getElementById('header-ch').textContent = 'CH' + cur.ch;
  document.getElementById('header-title').textContent = cur.title;
  document.getElementById('header-counter').textContent = `Step ${step} / ${TOTAL}`;

  // Update caption
  document.getElementById('caption-title').textContent = cur.title;
  document.getElementById('caption-body').innerHTML = cur.body;

  // Render references + rust code
  renderExtras(step);

  // Update dots (active / read)
  document.querySelectorAll('.dot').forEach(d => {
    const n = +d.dataset.step;
    d.classList.toggle('active', n === step);
    d.classList.toggle('read', n < step);
  });

  // Update controls
  document.getElementById('btn-prev').disabled = step === 1;
  document.getElementById('btn-next').disabled = step === TOTAL;

  // Sync URL
  if (history.replaceState) {
    history.replaceState(null, '', '#step-' + step);
  } else {
    location.hash = 'step-' + step;
  }
}

function initFromHash() {
  const m = location.hash.match(/step-(\d+)/);
  return m ? +m[1] : 1;
}

document.addEventListener('DOMContentLoaded', () => {
  buildDots();
  goTo(initFromHash());

  document.getElementById('btn-prev').addEventListener('click', () => goTo(currentStep - 1));
  document.getElementById('btn-next').addEventListener('click', () => goTo(currentStep + 1));
  document.getElementById('btn-replay').addEventListener('click', () => goTo(1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(currentStep - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); goTo(currentStep + 1); }
    if (e.key === 'Home')       { e.preventDefault(); goTo(1); }
    if (e.key === 'End')        { e.preventDefault(); goTo(TOTAL); }
  });

  window.addEventListener('hashchange', () => {
    const n = initFromHash();
    if (n !== currentStep) goTo(n);
  });
});
</script>
</body>
</html>
