<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Sesame · 多设备会话渐进教程</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Phycat-Cherry 渐进教程主题
   ============================================================ */
:root {
  --bg-page:        #fdfaf6;
  --bg-card:        #ffffff;
  --bg-soft-pink:   #fce4e4;

  --text-primary:   #1f2937;
  --text-secondary: #6b7280;
  --text-muted:     #9ca3af;

  --cherry:         #aa1141;
  --cherry-deep:    #9a0036;
  --cherry-soft:    #ffa6a6;
  --cherry-pink:    #ea68b6;
  --cherry-glass:   #fce4e4;

  --teal:           #0e7490;
  --teal-soft:      #cffafe;
  --amber:          #b45309;
  --amber-soft:     #fef3c7;
  --green:          #15803d;
  --green-soft:     #dcfce7;
  --violet:         #6d28d9;
  --violet-soft:    #ede9fe;
  --slate:          #475569;
  --slate-soft:     #f1f5f9;
  --red-deep:       #b91c1c;
  --red-soft:       #fee2e2;

  --rule:           #e5e7eb;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', 'JetBrains Mono', -apple-system, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.6;
}

/* ============== App layout ============== */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}

/* ============== Sidebar / stepper ============== */
.sidebar {
  background: var(--bg-card);
  border-right: 1px solid var(--rule);
  padding: 1.6rem 1.2rem;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  align-self: start;
}
.brand {
  font-size: 1rem;
  font-weight: 700;
  color: var(--cherry-deep);
  margin-bottom: 0.3rem;
  letter-spacing: -0.01em;
}
.brand-sub {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 1.6rem;
}
.chap {
  margin-bottom: 1rem;
  cursor: pointer;
}
.chap-name {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.45rem;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.chap-name .num {
  font-family: 'JetBrains Mono', monospace;
  color: var(--cherry);
  font-size: 0.7rem;
}
.dots { display: flex; gap: 6px; }
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--rule);
  cursor: pointer;
  transition: all 0.2s ease;
}
.dot:hover { transform: scale(1.25); }
.dot.read { background: var(--cherry-soft); }
.dot.active {
  background: var(--cherry);
  box-shadow: 0 0 0 3px var(--cherry-glass);
}

/* ============== Stage ============== */
.stage {
  display: flex;
  flex-direction: column;
  padding: 1.4rem 2rem 2rem;
  gap: 0.9rem;
  min-width: 0;
}

/* Header */
.header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
}
.header-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--cherry-deep);
}
.header-ch {
  padding: 3px 10px;
  background: var(--cherry-glass);
  color: var(--cherry-deep);
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
}
.header-counter {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* SVG stage */
.svg-wrap {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 12px;
  box-shadow: 0 1px 3px rgba(170,17,65,0.04);
  padding: 1rem 1.2rem;
  position: relative;
}
.chapter-svg {
  width: 100%;
  height: auto;
  max-height: 68vh;
  display: none;
}
.chapter-svg.active { display: block; }

/* SVG element visibility — controlled by data-step */
[data-step] {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 320ms ease, transform 320ms ease;
  pointer-events: none;
}
[data-step].visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* Caption card */
.caption {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-left: 4px solid var(--cherry);
  border-radius: 10px;
  padding: 0.85rem 1.1rem;
  min-height: 78px;
}
.caption-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--cherry-deep);
  margin-bottom: 0.25rem;
}
.caption-body {
  font-size: 0.85rem;
  color: var(--text-primary);
  line-height: 1.55;
}
.caption-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82em;
  background: var(--cherry-glass);
  color: var(--cherry-deep);
  padding: 1px 5px;
  border-radius: 4px;
}
.caption-body em {
  font-style: normal;
  color: var(--text-muted);
  font-size: 0.78em;
  margin-left: 0.3em;
}

/* Deep-dive: references + rust code */
.extras {
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}
.extras:empty { display: none; }
.extras.two-col {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
}
@media (max-width: 1100px) {
  .extras.two-col { grid-template-columns: 1fr; }
}
.extras-card {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 0.9rem 1.1rem;
  font-size: 0.82rem;
}
.extras-card.refs { border-left: 3px solid var(--violet); }
.extras-card.code { border-left: 3px solid var(--green); padding: 0; overflow: hidden; }
.extras-card h4 {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
  margin-bottom: 0.55rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.extras-card.refs h4 { color: var(--violet); }
.extras-card.code h4 {
  color: var(--green);
  padding: 0.7rem 1rem 0.4rem;
  margin-bottom: 0;
}
.extras-card.refs ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.extras-card.refs li {
  font-size: 0.8rem;
  line-height: 1.45;
}
.extras-card.refs a {
  color: var(--cherry-deep);
  text-decoration: none;
  border-bottom: 1px dashed var(--cherry-pink);
}
.extras-card.refs a:hover {
  color: var(--cherry);
  border-bottom-style: solid;
}
.extras-card.refs .ref-note {
  color: var(--text-muted);
  font-size: 0.72rem;
  margin-left: 0.4em;
}
.extras-card.code pre {
  margin: 0;
  padding: 0.4rem 1rem 0.9rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.74rem;
  line-height: 1.55;
  color: var(--text-primary);
  overflow-x: auto;
  white-space: pre;
  background: linear-gradient(to bottom, #ffffff, #fafff7);
}
.extras-card.code .kw { color: var(--violet); font-weight: 600; }
.extras-card.code .ty { color: var(--teal); }
.extras-card.code .fn { color: var(--cherry); }
.extras-card.code .cm { color: var(--text-muted); font-style: italic; }
.extras-card.code .str { color: var(--amber); }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
}
.controls button {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 8px 18px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.15s ease;
}
.controls button:hover:not(:disabled) {
  border-color: var(--cherry);
  color: var(--cherry-deep);
  background: var(--cherry-glass);
}
.controls button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.controls button.primary {
  background: var(--cherry);
  color: white;
  border-color: var(--cherry);
}
.controls button.primary:hover:not(:disabled) {
  background: var(--cherry-deep);
  color: white;
}
.controls button.ghost {
  border: none;
  color: var(--text-muted);
}
.controls .hint {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-left: 0.8rem;
}

/* ============== Common SVG styles ============== */
.svg-text { font-family: 'Noto Sans SC', sans-serif; }
.svg-mono { font-family: 'JetBrains Mono', monospace; }

/* Reusable SVG classes */
.actor-cherry { fill: var(--cherry-glass); stroke: var(--cherry); }
.actor-teal   { fill: var(--teal-soft); stroke: var(--teal); }
.actor-red    { fill: var(--red-soft); stroke: var(--red-deep); }
.actor-violet { fill: var(--violet-soft); stroke: var(--violet); }
.actor-amber  { fill: var(--amber-soft); stroke: var(--amber); }
.actor-green  { fill: var(--green-soft); stroke: var(--green); }

.label-cherry { fill: var(--cherry-deep); }
.label-teal   { fill: var(--teal); }
.label-red    { fill: var(--red-deep); }
.label-violet { fill: var(--violet); }
.label-amber  { fill: var(--amber); }
.label-green  { fill: var(--green); }
.label-slate  { fill: var(--slate); }
.label-muted  { fill: var(--text-muted); }

/* Sub-step animations: pulse for emphasis */
@keyframes pulse-glow {
  0%, 100% { filter: drop-shadow(0 0 0 transparent); }
  50% { filter: drop-shadow(0 0 6px var(--cherry-soft)); }
}
.pulse { animation: pulse-glow 2.4s ease infinite; }

/* Responsive */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sidebar { display: none; }
  .stage { padding: 1rem; }
}
</style>
</head>
<body>
<div class="app">
  <!-- ============== Sidebar ============== -->
  <aside class="sidebar">
    <div class="brand">🔄 Sesame · 多设备会话</div>
    <div class="brand-sub">渐进教程 · 13 步</div>

    <div class="chap" data-ch="1">
      <div class="chap-name"><span class="num">CH1</span> 多设备问题</div>
      <div class="dots" data-ch-dots="1"></div>
    </div>
    <div class="chap" data-ch="2">
      <div class="chap-name"><span class="num">CH2</span> 会话结构</div>
      <div class="dots" data-ch-dots="2"></div>
    </div>
    <div class="chap" data-ch="3">
      <div class="chap-name"><span class="num">CH3</span> 发送扇出</div>
      <div class="dots" data-ch-dots="3"></div>
    </div>
    <div class="chap" data-ch="4">
      <div class="chap-name"><span class="num">CH4</span> 接收与提升</div>
      <div class="dots" data-ch-dots="4"></div>
    </div>
    <div class="chap" data-ch="5">
      <div class="chap-name"><span class="num">CH5</span> 设备生命周期</div>
      <div class="dots" data-ch-dots="5"></div>
    </div>
  </aside>

  <!-- ============== Stage ============== -->
  <main class="stage">
    <header class="header">
      <span class="header-ch" id="header-ch">CH1</span>
      <h1 class="header-title" id="header-title">多设备问题</h1>
      <span class="header-counter" id="header-counter">Step 1 / 13</span>
    </header>

    <section class="svg-wrap">

      <!-- ============================================================
           Ch1 — 多设备问题
           ============================================================ -->
      <svg class="chapter-svg" data-ch="1" viewBox="0 0 1100 520" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arr-slate-1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
          </marker>
          <marker id="arr-red-1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
          </marker>
        </defs>

        <!-- Alice phone 始终在 (Step 1+) -->
        <g data-step="1">
          <rect x="140" y="160" width="140" height="70" rx="14" class="actor-cherry" stroke-width="2"/>
          <text x="210" y="195" text-anchor="middle" font-size="14" font-weight="700" class="label-cherry">📱 Alice phone</text>
          <text x="210" y="215" text-anchor="middle" font-size="11" class="label-muted">本机 = 发起方</text>
        </g>

        <!-- Bob phone -->
        <g data-step="1">
          <rect x="860" y="120" width="140" height="70" rx="14" class="actor-teal" stroke-width="2"/>
          <text x="930" y="155" text-anchor="middle" font-size="14" font-weight="700" class="label-teal">📱 Bob phone</text>
          <text x="930" y="175" text-anchor="middle" font-size="11" class="label-muted">device_id=1</text>
        </g>

        <!-- Bob iPad -->
        <g data-step="1">
          <rect x="860" y="220" width="140" height="70" rx="14" class="actor-teal" stroke-width="2"/>
          <text x="930" y="255" text-anchor="middle" font-size="14" font-weight="700" class="label-teal">📲 Bob iPad</text>
          <text x="930" y="275" text-anchor="middle" font-size="11" class="label-muted">device_id=2</text>
        </g>

        <!-- Bob laptop -->
        <g data-step="1">
          <rect x="860" y="320" width="140" height="70" rx="14" class="actor-teal" stroke-width="2"/>
          <text x="930" y="355" text-anchor="middle" font-size="14" font-weight="700" class="label-teal">💻 Bob laptop</text>
          <text x="930" y="375" text-anchor="middle" font-size="11" class="label-muted">device_id=3</text>
        </g>

        <!-- Step 1 only: 灰虚线 + 红 ✕ -->
        <g data-step="1" data-step-end="1">
          <line x1="290" y1="200" x2="860" y2="200" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6 6"/>
          <text x="540" y="190" text-anchor="middle" font-size="22" class="label-red" font-weight="700">✕</text>
          <text x="540" y="230" text-anchor="middle" font-size="12" class="label-red" font-weight="600">"发给 Bob" 该走哪一台？</text>
        </g>

        <!-- Step 2: 设备 mono 地址 -->
        <g data-step="2">
          <text x="210" y="248" text-anchor="middle" font-size="12" class="svg-mono label-cherry" font-weight="600">alice/1</text>
          <text x="930" y="195" text-anchor="middle" font-size="12" class="svg-mono label-teal" font-weight="600">bob/1</text>
          <text x="930" y="295" text-anchor="middle" font-size="12" class="svg-mono label-teal" font-weight="600">bob/2</text>
          <text x="930" y="395" text-anchor="middle" font-size="12" class="svg-mono label-teal" font-weight="600">bob/3</text>
          <text x="540" y="200" text-anchor="middle" font-size="13" class="label-violet" font-weight="700">ProtocolAddress</text>
          <text x="540" y="220" text-anchor="middle" font-size="11" class="label-muted">= (name, device_id)</text>
          <text x="540" y="240" text-anchor="middle" font-size="11" class="label-muted">每台设备独立 IK + SPK + OTPK</text>
        </g>

        <!-- Step 1 only: 困境说明面板 -->
        <g data-step="1" data-step-end="1">
          <rect x="320" y="380" width="460" height="110" rx="10" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.5"/>
          <text x="550" y="402" text-anchor="middle" font-size="12" class="label-red" font-weight="700">⚠️ Double Ratchet 的端点假设</text>
          <text x="550" y="424" text-anchor="middle" font-size="11" class="label-slate">DR 协议本身只在"两个端点"之间 ping-pong：</text>
          <text x="550" y="442" text-anchor="middle" font-size="11" class="svg-mono label-slate">(Alice 的一对 IK) ↔ (Bob 的一对 IK)</text>
          <text x="550" y="462" text-anchor="middle" font-size="11" class="label-slate">现实里 Bob 有 N 台设备 → N 对独立的 IK</text>
          <text x="550" y="480" text-anchor="middle" font-size="10" class="label-muted">"发给 Bob"这句话在协议层面无法直接表达</text>
        </g>

        <!-- Step 2 only: ProtocolAddress 结构面板 -->
        <g data-step="2" data-step-end="2">
          <rect x="320" y="380" width="460" height="110" rx="10" class="actor-violet" stroke-width="2"/>
          <text x="550" y="402" text-anchor="middle" font-size="12" class="label-violet" font-weight="700">ProtocolAddress · 寻址原子</text>
          <text x="550" y="422" text-anchor="middle" font-size="11" class="svg-mono label-violet">struct ProtocolAddress { name: String, device_id: DeviceId }</text>
          <text x="550" y="440" text-anchor="middle" font-size="11" class="label-slate">name 通常 = ServiceId 字符串（账号 UUID）</text>
          <text x="550" y="458" text-anchor="middle" font-size="11" class="svg-mono label-slate">DeviceId = NonZeroU8 → 单账号上限 255 台设备</text>
          <text x="550" y="478" text-anchor="middle" font-size="10" class="label-muted">规范来源：Sesame §2 Terms + libsignal address.rs</text>
        </g>

        <!-- Hint top -->
        <g data-step="1" data-step-end="1">
          <text x="550" y="60" text-anchor="middle" font-size="13" class="label-muted">DR 端点 = 一台设备；多设备时一个"Bob"对应多个端点</text>
        </g>
        <g data-step="2" data-step-end="2">
          <text x="550" y="60" text-anchor="middle" font-size="13" class="label-muted">每台设备有独立的 (name, device_id)，独立的 IK + SPK + OTPK</text>
        </g>
      </svg>

      <!-- ============================================================
           Ch2 — 会话结构
           ============================================================ -->
      <svg class="chapter-svg" data-ch="2" viewBox="0 0 1100 520" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arr-slate-2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
          </marker>
          <marker id="arr-amber-2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
          </marker>
          <marker id="arr-violet-2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d28d9"/>
          </marker>
        </defs>

        <!-- Alice phone (始终) -->
        <g data-step="3">
          <rect x="140" y="160" width="140" height="70" rx="14" class="actor-cherry" stroke-width="2"/>
          <text x="210" y="195" text-anchor="middle" font-size="14" font-weight="700" class="label-cherry">📱 Alice phone</text>
          <text x="210" y="215" text-anchor="middle" font-size="11" class="svg-mono label-muted">alice/1</text>
        </g>

        <!-- Bob 三台设备 -->
        <g data-step="3">
          <rect x="860" y="120" width="140" height="60" rx="14" class="actor-teal" stroke-width="2"/>
          <text x="930" y="146" text-anchor="middle" font-size="13" font-weight="700" class="label-teal">📱 Bob phone</text>
          <text x="930" y="166" text-anchor="middle" font-size="10" class="svg-mono label-muted">bob/1</text>

          <rect x="860" y="200" width="140" height="60" rx="14" class="actor-teal" stroke-width="2"/>
          <text x="930" y="226" text-anchor="middle" font-size="13" font-weight="700" class="label-teal">📲 Bob iPad</text>
          <text x="930" y="246" text-anchor="middle" font-size="10" class="svg-mono label-muted">bob/2</text>

          <rect x="860" y="280" width="140" height="60" rx="14" class="actor-teal" stroke-width="2"/>
          <text x="930" y="306" text-anchor="middle" font-size="13" font-weight="700" class="label-teal">💻 Bob laptop</text>
          <text x="930" y="326" text-anchor="middle" font-size="10" class="svg-mono label-muted">bob/3</text>
        </g>

        <!-- Step 3: 底部 amber session 框 + 三条连线（Step 5 改用 active/inactive 摞框） -->
        <g data-step="3" data-step-end="4">
          <rect x="350" y="430" width="120" height="40" rx="8" class="actor-amber" stroke-width="1.5"/>
          <text x="410" y="448" text-anchor="middle" font-size="11" class="label-amber" font-weight="700">SessionRecord</text>
          <text x="410" y="463" text-anchor="middle" font-size="10" class="svg-mono label-muted">→ bob/1</text>

          <rect x="490" y="430" width="120" height="40" rx="8" class="actor-amber" stroke-width="1.5"/>
          <text x="550" y="448" text-anchor="middle" font-size="11" class="label-amber" font-weight="700">SessionRecord</text>
          <text x="550" y="463" text-anchor="middle" font-size="10" class="svg-mono label-muted">→ bob/2</text>

          <rect x="630" y="430" width="120" height="40" rx="8" class="actor-amber" stroke-width="1.5"/>

  { ch: 1, title: 'ProtocolAddress = (name, device_id)', body: 'Sesame 的最小寻址单元叫 <code>ProtocolAddress</code>，在 libsignal 里就是 <code>(name: String, device_id: DeviceId)</code> 二元组。<br>• <code>name</code> 通常填 <code>ServiceId</code> 字符串（账号 UUID）。<br>• <code>device_id</code> 是 <code>NonZeroU8</code> —— 一个账号最多 255 台设备。<br>每台设备各自生成自己的身份密钥 IK、签名预共享密钥 SPK、一池子一次性 OTPK，独立向服务器注册。<br>从此 "alice/1" "bob/2" 是两个完全不同的 DR 端点，跟两个独立账号没有本质区别。' },

  { ch: 2, title: '会话簿 · UserRecord → DeviceRecord 映射', body: '本地为每个联系人维护"<code>UserID → {DeviceID → DeviceRecord}</code>"两层表。这是 Sesame 规范术语，叫 <code>UserRecord</code>（按用户聚合）和 <code>DeviceRecord</code>（按设备聚合）。<br>libsignal <strong>没有专门的 UserRecord 类型</strong>，由 <code>SessionStore</code>（按 ProtocolAddress 取 SessionRecord）+ 应用层维护的 device list 拼出来。<br>这张表的意义：发送一条消息时，先按 UserID 查到全部 DeviceID，再按每个 DeviceID 取 SessionRecord。<em>"会话簿"是 Sesame 的灵魂数据结构。</em>' },
  { ch: 2, title: 'Active session vs Inactive sessions', body: '每个 DeviceRecord 内部还分两层：<br>• <strong>active session</strong>：当前用来加密的那一份 DR 状态。<br>• <strong>inactive sessions (n)</strong>：之前的旧 session 摞着，留作 trial-decrypt 收延迟消息。<br>规则三条：<br>① 新建 session（如对端重装）时，旧 active 降为 inactive head。<br>② 收到一条用 inactive 加密的消息，命中后 <strong>promote 它为新 active</strong>。<br>③ inactive 数量有上限 / 时限，规则在 <code>SessionRecord</code> 内部封装。<br>这套机制让 session 切换平滑：不会因为一边升级而立刻丢失对端在途的旧消息。' },

function renderExtras(step) {
  const el = document.getElementById('extras');
  const extra = STEP_EXTRAS[step] || {};
  let html = '';

  if (extra.refs && extra.refs.length) {
    html += '<div class="extras-card refs"><h4>📚 延伸阅读 · 原理出处</h4><ul>';
    for (const r of extra.refs) {
      const note = r.note ? `<span class="ref-note">— ${r.note}</span>` : '';
      html += `<li><a href="${r.url}" target="_blank" rel="noopener">${r.title}</a>${note}</li>`;
    }
    html += '</ul></div>';
  }

  if (extra.code) {
    html += `<div class="extras-card code"><h4>🦀 Rust 骨架</h4><pre>${extra.code}</pre></div>`;
  }

  // Single-card → stretch full width; both cards → keep 2-col grid
  el.classList.toggle('two-col', !!(extra.refs && extra.refs.length && extra.code));
  el.innerHTML = html;
}

// Build dots in sidebar
function buildDots() {
  const groups = {};
  STEPS.forEach((s, i) => {
    (groups[s.ch] ||= []).push(i + 1);
  });
  Object.entries(groups).forEach(([ch, steps]) => {
    const wrap = document.querySelector(`.dots[data-ch-dots="${ch}"]`);
    if (!wrap) return;
    steps.forEach(n => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.dataset.step = n;
      d.title = `Step ${n}`;
      d.addEventListener('click', () => goTo(n));
      wrap.appendChild(d);
    });
  });
}

let currentStep = 1;

function goTo(step) {
  step = Math.max(1, Math.min(TOTAL, step));
  currentStep = step;
  const cur = STEPS[step - 1];

  // Activate the right chapter SVG
  document.querySelectorAll('.chapter-svg').forEach(svg => {
    svg.classList.toggle('active', +svg.dataset.ch === cur.ch);
  });

  // Apply visibility to all data-step elements
  document.querySelectorAll('[data-step]').forEach(el => {
    const start = +el.dataset.step;
    const end = el.dataset.stepEnd ? +el.dataset.stepEnd : 999;
    const visible = step >= start && step <= end;
    // Defer to next frame so transition triggers
    requestAnimationFrame(() => el.classList.toggle('visible', visible));
  });

  // Update header
  document.getElementById('header-ch').textContent = 'CH' + cur.ch;
  document.getElementById('header-title').textContent = cur.title;
  document.getElementById('header-counter').textContent = `Step ${step} / ${TOTAL}`;

  // Update caption
  document.getElementById('caption-title').textContent = cur.title;
  document.getElementById('caption-body').innerHTML = cur.body;

  // Render references + rust code
  renderExtras(step);

  // Update dots (active / read)
  document.querySelectorAll('.dot').forEach(d => {
    const n = +d.dataset.step;
    d.classList.toggle('active', n === step);
    d.classList.toggle('read', n < step);
  });

  // Update controls
  document.getElementById('btn-prev').disabled = step === 1;
  document.getElementById('btn-next').disabled = step === TOTAL;

  // Sync URL
  if (history.replaceState) {
    history.replaceState(null, '', '#step-' + step);
  } else {
    location.hash = 'step-' + step;
  }
}

function initFromHash() {
  const m = location.hash.match(/step-(\d+)/);
  return m ? +m[1] : 1;
}

document.addEventListener('DOMContentLoaded', () => {
  buildDots();
  goTo(initFromHash());

  document.getElementById('btn-prev').addEventListener('click', () => goTo(currentStep - 1));
  document.getElementById('btn-next').addEventListener('click', () => goTo(currentStep + 1));
  document.getElementById('btn-replay').addEventListener('click', () => goTo(1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(currentStep - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); goTo(currentStep + 1); }
    if (e.key === 'Home')       { e.preventDefault(); goTo(1); }
    if (e.key === 'End')        { e.preventDefault(); goTo(TOTAL); }
  });

  window.addEventListener('hashchange', () => {
    const n = initFromHash();
    if (n !== currentStep) goTo(n);
  });
});
</script>
