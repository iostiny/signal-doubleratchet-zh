<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise Protocol · 零基础渐进教程</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Phycat-Cherry 渐进教程主题
   ============================================================ */
:root {
  --bg-page:        #fdfaf6;
  --bg-card:        #ffffff;
  --bg-soft-pink:   #fce4e4;

  --text-primary:   #1f2937;
  --text-secondary: #6b7280;
  --text-muted:     #9ca3af;

  --cherry:         #aa1141;
  --cherry-deep:    #9a0036;
  --cherry-soft:    #ffa6a6;
  --cherry-pink:    #ea68b6;
  --cherry-glass:   #fce4e4;

  --teal:           #0e7490;
  --teal-soft:      #cffafe;
  --amber:          #b45309;
  --amber-soft:     #fef3c7;
  --green:          #15803d;
  --green-soft:     #dcfce7;
  --violet:         #6d28d9;
  --violet-soft:    #ede9fe;
  --slate:          #475569;
  --slate-soft:     #f1f5f9;
  --red-deep:       #b91c1c;
  --red-soft:       #fee2e2;

  --rule:           #e5e7eb;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', 'JetBrains Mono', -apple-system, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.6;
}

/* ============== App layout ============== */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}

/* ============== Sidebar / stepper ============== */
.sidebar {
  background: var(--bg-card);
  border-right: 1px solid var(--rule);
  padding: 1.6rem 1.2rem;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  align-self: start;
}
.brand {
  font-size: 1rem;
  font-weight: 700;
  color: var(--cherry-deep);
  margin-bottom: 0.3rem;
  letter-spacing: -0.01em;
}
.brand-sub {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 1.6rem;
}
.chap {
  margin-bottom: 1rem;
  cursor: pointer;
}
.chap-name {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.45rem;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.chap-name .num {
  font-family: 'JetBrains Mono', monospace;
  color: var(--cherry);
  font-size: 0.7rem;
}
.dots { display: flex; gap: 6px; }
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--rule);
  cursor: pointer;
  transition: all 0.2s ease;
}
.dot:hover { transform: scale(1.25); }
.dot.read { background: var(--cherry-soft); }
.dot.active {
  background: var(--cherry);
  box-shadow: 0 0 0 3px var(--cherry-glass);
}

/* ============== Stage ============== */
.stage {
  display: flex;
  flex-direction: column;
  padding: 1.4rem 2rem 2rem;
  gap: 0.9rem;
  min-width: 0;
}

/* Header */
.header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
}
.header-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--cherry-deep);
}
.header-ch {
  padding: 3px 10px;
  background: var(--cherry-glass);
  color: var(--cherry-deep);
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
}
.header-counter {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* SVG stage */
.svg-wrap {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 12px;
  box-shadow: 0 1px 3px rgba(170,17,65,0.04);
  padding: 1rem 1.2rem;
  position: relative;
}
.chapter-svg {
  width: 100%;
  height: auto;
  max-height: 68vh;
  display: none;
}
.chapter-svg.active { display: block; }

/* SVG element visibility — controlled by data-step */
[data-step] {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 320ms ease, transform 320ms ease;
  pointer-events: none;
}
[data-step].visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* Caption card */
.caption {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-left: 4px solid var(--cherry);
  border-radius: 10px;
  padding: 0.85rem 1.1rem;
  min-height: 78px;
}
.caption-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--cherry-deep);
  margin-bottom: 0.25rem;
}
.caption-body {
  font-size: 0.85rem;
  color: var(--text-primary);
  line-height: 1.55;
}
.caption-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82em;
  background: var(--cherry-glass);
  color: var(--cherry-deep);
  padding: 1px 5px;
  border-radius: 4px;
}
.caption-body em {
  font-style: normal;
  color: var(--text-muted);
  font-size: 0.78em;
  margin-left: 0.3em;
}

/* Deep-dive: references + swift code */
.extras {
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}
.extras:empty { display: none; }
.extras.two-col {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
}
@media (max-width: 1100px) {
  .extras.two-col { grid-template-columns: 1fr; }
}
.extras-card {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 0.9rem 1.1rem;
  font-size: 0.82rem;
}
.extras-card.refs { border-left: 3px solid var(--violet); }
.extras-card.code { border-left: 3px solid var(--green); padding: 0; overflow: hidden; }
.extras-card h4 {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
  margin-bottom: 0.55rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.extras-card.refs h4 { color: var(--violet); }
.extras-card.code h4 {
  color: var(--green);
  padding: 0.7rem 1rem 0.4rem;
  margin-bottom: 0;
}
.extras-card.refs ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.extras-card.refs li {
  font-size: 0.8rem;
  line-height: 1.45;
}
.extras-card.refs a {
  color: var(--cherry-deep);
  text-decoration: none;
  border-bottom: 1px dashed var(--cherry-pink);
}
.extras-card.refs a:hover {
  color: var(--cherry);
  border-bottom-style: solid;
}
.extras-card.refs .ref-note {
  color: var(--text-muted);
  font-size: 0.72rem;
  margin-left: 0.4em;
}
.extras-card.code pre {
  margin: 0;
  padding: 0.4rem 1rem 0.9rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.74rem;
  line-height: 1.55;
  color: var(--text-primary);
  overflow-x: auto;
  white-space: pre;
  background: linear-gradient(to bottom, #ffffff, #fafff7);
}
.extras-card.code .kw { color: var(--violet); font-weight: 600; }
.extras-card.code .ty { color: var(--teal); }
.extras-card.code .fn { color: var(--cherry); }
.extras-card.code .cm { color: var(--text-muted); font-style: italic; }
.extras-card.code .str { color: var(--amber); }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
}
.controls button {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 8px 18px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.15s ease;
}
.controls button:hover:not(:disabled) {
  border-color: var(--cherry);
  color: var(--cherry-deep);
  background: var(--cherry-glass);
}
.controls button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.controls button.primary {
  background: var(--cherry);
  color: white;
  border-color: var(--cherry);
}
.controls button.primary:hover:not(:disabled) {
  background: var(--cherry-deep);
  color: white;
}
.controls button.ghost {
  border: none;
  color: var(--text-muted);
}
.controls .hint {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-left: 0.8rem;
}

/* ============== Common SVG styles ============== */
.svg-text { font-family: 'Noto Sans SC', sans-serif; }
.svg-mono { font-family: 'JetBrains Mono', monospace; }

/* Reusable SVG classes */
.actor-cherry { fill: var(--cherry-glass); stroke: var(--cherry); }
.actor-teal   { fill: var(--teal-soft); stroke: var(--teal); }
.actor-red    { fill: var(--red-soft); stroke: var(--red-deep); }
.actor-violet { fill: var(--violet-soft); stroke: var(--violet); }
.actor-amber  { fill: var(--amber-soft); stroke: var(--amber); }
.actor-green  { fill: var(--green-soft); stroke: var(--green); }

.label-cherry { fill: var(--cherry-deep); }
.label-teal   { fill: var(--teal); }
.label-red    { fill: var(--red-deep); }
.label-violet { fill: var(--violet); }
.label-amber  { fill: var(--amber); }
.label-green  { fill: var(--green); }
.label-slate  { fill: var(--slate); }
.label-muted  { fill: var(--text-muted); }

/* Sub-step animations: pulse for emphasis */
@keyframes pulse-glow {
  0%, 100% { filter: drop-shadow(0 0 0 transparent); }
  50% { filter: drop-shadow(0 0 6px var(--cherry-soft)); }
}
.pulse { animation: pulse-glow 2.4s ease infinite; }

/* Responsive */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sidebar { display: none; }
  .stage { padding: 1rem; }
}
</style>
</head>
<body>
<div class="app">
  <!-- ============== Sidebar ============== -->
  <aside class="sidebar">
    <div class="brand">🔇 Noise Protocol</div>
    <div class="brand-sub">渐进版本 · 16 步</div>

    <div class="chap" data-ch="1">
      <div class="chap-name"><span class="num">CH1</span> 动机</div>
      <div class="dots" data-ch-dots="1"></div>
    </div>
    <div class="chap" data-ch="2">
      <div class="chap-name"><span class="num">CH2</span> 原语 + 记号</div>
      <div class="dots" data-ch-dots="2"></div>
    </div>
    <div class="chap" data-ch="3">
      <div class="chap-name"><span class="num">CH3</span> 状态机</div>
      <div class="dots" data-ch-dots="3"></div>
    </div>
    <div class="chap" data-ch="4">
      <div class="chap-name"><span class="num">CH4</span> XX 握手三轮</div>
      <div class="dots" data-ch-dots="4"></div>
    </div>
    <div class="chap" data-ch="5">
      <div class="chap-name"><span class="num">CH5</span> Transport</div>
      <div class="dots" data-ch-dots="5"></div>
    </div>
    <div class="chap" data-ch="6">
      <div class="chap-name"><span class="num">CH6</span> Bitchat 落地</div>
      <div class="dots" data-ch-dots="6"></div>
    </div>
  </aside>

  <!-- ============== Stage ============== -->
  <main class="stage">
    <header class="header">
      <span class="header-ch" id="header-ch">CH1</span>
      <h1 class="header-title" id="header-title">为什么 BLE 聊天用不了 TLS</h1>
      <span class="header-counter" id="header-counter">Step 1 / 16</span>
    </header>

    <section class="svg-wrap">

      <!-- ============================================================
           Ch1 — 动机 (Step 1-2)
           ============================================================ -->
      <svg class="chapter-svg" data-ch="1" viewBox="0 0 1100 520" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arr-slate-1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
          </marker>
          <marker id="arr-red-1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
          </marker>
        </defs>

        <!-- Hint top -->
        <g data-step="1" data-step-end="1">
          <text x="550" y="60" text-anchor="middle" font-size="13" class="label-muted">BLE p2p 没 server / 没 PKI / 没 CA — TLS 的信任锚直接缺位</text>
        </g>
        <g data-step="2" data-step-end="2">
          <text x="550" y="60" text-anchor="middle" font-size="13" class="label-muted">Noise 是协议构建器，按需拼出 mutual auth + identity hiding + PFS + KCI 抗性</text>
        </g>

        <!-- Alice -->
        <g data-step="1">
          <circle cx="140" cy="240" r="44" class="actor-cherry" stroke-width="2"/>
          <text x="140" y="246" text-anchor="middle" font-size="22" font-weight="700" class="label-cherry">A</text>
          <text x="140" y="305" text-anchor="middle" font-size="14" font-weight="600" class="label-cherry">Alice</text>
          <text x="140" y="324" text-anchor="middle" font-size="11" class="label-muted">iPhone · BLE</text>
        </g>

        <!-- Bob -->
        <g data-step="1">
          <circle cx="960" cy="240" r="44" class="actor-teal" stroke-width="2"/>
          <text x="960" y="246" text-anchor="middle" font-size="22" font-weight="700" class="label-teal">B</text>
          <text x="960" y="305" text-anchor="middle" font-size="14" font-weight="600" class="label-teal">Bob</text>
          <text x="960" y="324" text-anchor="middle" font-size="11" class="label-muted">iPhone · BLE</text>
        </g>

        <!-- BLE channel (always visible from step 1) -->
        <g data-step="1">
          <line x1="190" y1="240" x2="910" y2="240" stroke="#475569" stroke-width="2" stroke-dasharray="6 4"/>
          <text x="550" y="232" text-anchor="middle" font-size="12" class="label-slate" font-weight="500">BLE GATT 通道（短距离 · 离线）</text>
        </g>

        <!-- Step 1: CA / Server box with red X -->
        <g data-step="1" data-step-end="1">
          <rect x="430" y="120" width="240" height="70" rx="10" fill="#f1f5f9" stroke="#9ca3af" stroke-width="1.5"/>
          <text x="550" y="148" text-anchor="middle" font-size="13" class="label-slate" font-weight="600">CA · 证书颁发机构</text>
          <text x="550" y="170" text-anchor="middle" font-size="11" class="label-muted">Server 也要在线签发证书</text>
          <!-- big red X across it -->
          <line x1="420" y1="115" x2="680" y2="195" stroke="#b91c1c" stroke-width="3"/>
          <line x1="680" y1="115" x2="420" y2="195" stroke="#b91c1c" stroke-width="3"/>
          <text x="700" y="160" font-size="13" class="label-red" font-weight="700">不可达</text>
        </g>

        <!-- Step 1: TLS broken text -->
        <g data-step="1" data-step-end="1">
          <text x="550" y="400" text-anchor="middle" font-size="13" class="label-red" font-weight="600">TLS 的"先去 CA 验证证书"假设彻底报废</text>
          <text x="550" y="420" text-anchor="middle" font-size="11" class="label-muted">但仍要双向认证 + 前向保密 + 身份不被旁观者识破</text>
        </g>

        <!-- Step 2: Noise pattern capsule -->
        <g data-step="2">
          <rect x="350" y="130" width="400" height="56" rx="28" class="actor-amber" stroke-width="2"/>
          <text x="550" y="155" text-anchor="middle" font-size="14" font-weight="700" class="label-amber svg-mono">Noise_XX_25519_ChaChaPoly_SHA256</text>
          <text x="550" y="173" text-anchor="middle" font-size="11" class="label-muted">Pattern_DH_Cipher_Hash · 协议名即是配方</text>
        </g>

        <!-- Step 2: 4 small property labels -->
        <g data-step="2">
          <rect x="180" y="380" width="160" height="60" rx="8" class="actor-violet" stroke-width="1.5"/>
          <text x="260" y="402" text-anchor="middle" font-size="12" class="label-violet" font-weight="700">mutual auth</text>
          <text x="260" y="422" text-anchor="middle" font-size="10" class="label-muted">双方都验证对方身份</text>

          <rect x="360" y="380" width="160" height="60" rx="8" class="actor-violet" stroke-width="1.5"/>
          <text x="440" y="402" text-anchor="middle" font-size="12" class="label-violet" font-weight="700">identity hiding</text>
          <text x="440" y="422" text-anchor="middle" font-size="10" class="label-muted">static key 在密文里传</text>

          <rect x="540" y="380" width="160" height="60" rx="8" class="actor-violet" stroke-width="1.5"/>
          <text x="620" y="402" text-anchor="middle" font-size="12" class="label-violet" font-weight="700">PFS</text>
          <text x="620" y="422" text-anchor="middle" font-size="10" class="label-muted">每会话新 ephemeral key</text>

          <rect x="720" y="380" width="160" height="60" rx="8" class="actor-violet" stroke-width="1.5"/>
          <text x="800" y="402" text-anchor="middle" font-size="12" class="label-violet" font-weight="700">KCI 抗性</text>
          <text x="800" y="422" text-anchor="middle" font-size="10" class="label-muted">单边私钥泄漏不能仿冒</text>
        </g>
      </svg>

      <!-- ============================================================
           Ch2 — 原语 + 记号 (Step 3-4)
           ============================================================ -->
      <svg class="chapter-svg" data-ch="2" viewBox="0 0 1100 520" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arr-violet-2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d28d9"/>
          </marker>
        </defs>

        <!-- Hint -->
        <g data-step="3" data-step-end="3">
          <text x="550" y="60" text-anchor="middle" font-size="13" class="label-muted">XX_25519_ChaChaPoly_SHA256 名字里这四件原语 — 全部由 CryptoKit 提供</text>
        </g>
        <g data-step="4" data-step-end="4">
          <text x="550" y="60" text-anchor="middle" font-size="13" class="label-muted">读懂 Noise spec 的钥匙：每个 token 要么放公钥，要么做 DH</text>
        </g>

        <!-- Step 3: 4 primitive boxes top row -->
        <g data-step="3">
          <rect x="80" y="110" width="200" height="100" rx="10" class="actor-violet" stroke-width="2"/>
          <text x="180" y="138" text-anchor="middle" font-size="14" font-weight="700" class="label-violet">X25519 DH</text>
          <text x="180" y="160" text-anchor="middle" font-size="11" class="label-slate">Curve25519 椭圆曲线</text>
          <text x="180" y="178" text-anchor="middle" font-size="10" class="label-muted">两人公开信道协商共享秘密</text>
          <text x="180" y="196" text-anchor="middle" font-size="10" class="svg-mono label-violet">32B 私钥 → 32B 共享</text>

          <rect x="300" y="110" width="200" height="100" rx="10" class="actor-violet" stroke-width="2"/>
          <text x="400" y="138" text-anchor="middle" font-size="14" font-weight="700" class="label-violet">ChaChaPoly AEAD</text>
          <text x="400" y="160" text-anchor="middle" font-size="11" class="label-slate">认证加密 (RFC 8439)</text>
          <text x="400" y="178" text-anchor="middle" font-size="10" class="label-muted">同时提供机密性 + 完整性</text>
          <text x="400" y="196" text-anchor="middle" font-size="10" class="svg-mono label-violet">12B nonce + 16B tag</text>

          <rect x="520" y="110" width="200" height="100" rx="10" class="actor-violet" stroke-width="2"/>
          <text x="620" y="138" text-anchor="middle" font-size="14" font-weight="700" class="label-violet">SHA-256</text>
          <text x="620" y="160" text-anchor="middle" font-size="11" class="label-slate">单向哈希</text>
          <text x="620" y="178" text-anchor="middle" font-size="10" class="label-muted">累积 transcript 摘要</text>
          <text x="620" y="196" text-anchor="middle" font-size="10" class="svg-mono label-violet">任意输入 → 32B 输出</text>

          <rect x="740" y="110" width="200" height="100" rx="10" class="actor-violet" stroke-width="2"/>
          <text x="840" y="138" text-anchor="middle" font-size="14" font-weight="700" class="label-violet">HKDF</text>
          <text x="840" y="160" text-anchor="middle" font-size="11" class="label-slate">密钥派生 (RFC 5869)</text>
          <text x="840" y="178" text-anchor="middle" font-size="10" class="label-muted">extract + expand 两步</text>
          <text x="840" y="196" text-anchor="middle" font-size="10" class="svg-mono label-violet">底层 = HMAC-SHA256</text>
        </g>

        <!-- Step 3: pattern formula bottom -->
        <g data-step="3">
          <rect x="200" y="290" width="700" height="80" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
          <text x="550" y="318" text-anchor="middle" font-size="14" font-weight="700" class="label-amber">Noise 协议名 = Pattern _ DH _ Cipher _ Hash</text>

function renderExtras(step) {
  const el = document.getElementById('extras');
  const extra = STEP_EXTRAS[step] || {};
  let html = '';

  if (extra.refs && extra.refs.length) {
    html += '<div class="extras-card refs"><h4>📚 延伸阅读 · 原理出处</h4><ul>';
    for (const r of extra.refs) {
      const note = r.note ? `<span class="ref-note">— ${r.note}</span>` : '';
      html += `<li><a href="${r.url}" target="_blank" rel="noopener">${r.title}</a>${note}</li>`;
    }
    html += '</ul></div>';
  }

  if (extra.code) {
    html += `<div class="extras-card code"><h4>🍎 Swift 骨架</h4><pre>${extra.code}</pre></div>`;
  }

  // Single-card → stretch full width; both cards → keep 2-col grid
  el.classList.toggle('two-col', !!(extra.refs && extra.refs.length && extra.code));
  el.innerHTML = html;
}

// Build dots in sidebar
function buildDots() {
  const groups = {};
  STEPS.forEach((s, i) => {
    (groups[s.ch] ||= []).push(i + 1);
  });
  Object.entries(groups).forEach(([ch, steps]) => {
    const wrap = document.querySelector(`.dots[data-ch-dots="${ch}"]`);
    if (!wrap) return;
    steps.forEach(n => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.dataset.step = n;
      d.title = `Step ${n}`;
      d.addEventListener('click', () => goTo(n));
      wrap.appendChild(d);
    });
  });
}

let currentStep = 1;

function goTo(step) {
  step = Math.max(1, Math.min(TOTAL, step));
  currentStep = step;
  const cur = STEPS[step - 1];

  // Activate the right chapter SVG
  document.querySelectorAll('.chapter-svg').forEach(svg => {
    svg.classList.toggle('active', +svg.dataset.ch === cur.ch);
  });

  // Apply visibility to all data-step elements
  document.querySelectorAll('[data-step]').forEach(el => {
    const start = +el.dataset.step;
    const end = el.dataset.stepEnd ? +el.dataset.stepEnd : 999;
    const visible = step >= start && step <= end;
    // Defer to next frame so transition triggers
    requestAnimationFrame(() => el.classList.toggle('visible', visible));
  });

  // Update header
  document.getElementById('header-ch').textContent = 'CH' + cur.ch;
  document.getElementById('header-title').textContent = cur.title;
  document.getElementById('header-counter').textContent = `Step ${step} / ${TOTAL}`;

  // Update caption
  document.getElementById('caption-title').textContent = cur.title;
  document.getElementById('caption-body').innerHTML = cur.body;

  // Render references + swift code
  renderExtras(step);

  // Update dots (active / read)
  document.querySelectorAll('.dot').forEach(d => {
    const n = +d.dataset.step;
    d.classList.toggle('active', n === step);
    d.classList.toggle('read', n < step);
  });

  // Update controls
  document.getElementById('btn-prev').disabled = step === 1;
  document.getElementById('btn-next').disabled = step === TOTAL;

  // Sync URL
  if (history.replaceState) {
    history.replaceState(null, '', '#step-' + step);
  } else {
    location.hash = 'step-' + step;
  }
}

function initFromHash() {
  const m = location.hash.match(/step-(\d+)/);
  return m ? +m[1] : 1;
}

document.addEventListener('DOMContentLoaded', () => {
  buildDots();
  goTo(initFromHash());

  document.getElementById('btn-prev').addEventListener('click', () => goTo(currentStep - 1));
  document.getElementById('btn-next').addEventListener('click', () => goTo(currentStep + 1));
  document.getElementById('btn-replay').addEventListener('click', () => goTo(1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(currentStep - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); goTo(currentStep + 1); }
    if (e.key === 'Home')       { e.preventDefault(); goTo(1); }
    if (e.key === 'End')        { e.preventDefault(); goTo(TOTAL); }
  });

  window.addEventListener('hashchange', () => {
    const n = initFromHash();
    if (n !== currentStep) goTo(n);
  });
});
