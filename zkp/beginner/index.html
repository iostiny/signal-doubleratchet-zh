<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero-Knowledge Proof · 零基础渐进教程</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Phycat-Cherry 渐进教程主题
   ============================================================ */
:root {
  --bg-page:        #fdfaf6;
  --bg-card:        #ffffff;
  --bg-soft-pink:   #fce4e4;

  --text-primary:   #1f2937;
  --text-secondary: #6b7280;
  --text-muted:     #9ca3af;

  --cherry:         #aa1141;
  --cherry-deep:    #9a0036;
  --cherry-soft:    #ffa6a6;
  --cherry-pink:    #ea68b6;
  --cherry-glass:   #fce4e4;

  --teal:           #0e7490;
  --teal-soft:      #cffafe;
  --amber:          #b45309;
  --amber-soft:     #fef3c7;
  --green:          #15803d;
  --green-soft:     #dcfce7;
  --violet:         #6d28d9;
  --violet-soft:    #ede9fe;
  --slate:          #475569;
  --slate-soft:     #f1f5f9;
  --red-deep:       #b91c1c;
  --red-soft:       #fee2e2;

  --rule:           #e5e7eb;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', 'JetBrains Mono', -apple-system, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.6;
}

/* ============== App layout ============== */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}

/* ============== Sidebar / stepper ============== */
.sidebar {
  background: var(--bg-card);
  border-right: 1px solid var(--rule);
  padding: 1.6rem 1.2rem;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  align-self: start;
}
.brand {
  font-size: 1rem;
  font-weight: 700;
  color: var(--cherry-deep);
  margin-bottom: 0.3rem;
  letter-spacing: -0.01em;
}
.brand-sub {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 1.6rem;
}
.chap {
  margin-bottom: 1rem;
  cursor: pointer;
}
.chap-name {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.45rem;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.chap-name .num {
  font-family: 'JetBrains Mono', monospace;
  color: var(--cherry);
  font-size: 0.7rem;
}
.dots { display: flex; gap: 6px; }
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--rule);
  cursor: pointer;
  transition: all 0.2s ease;
}
.dot:hover { transform: scale(1.25); }
.dot.read { background: var(--cherry-soft); }
.dot.active {
  background: var(--cherry);
  box-shadow: 0 0 0 3px var(--cherry-glass);
}

/* ============== Stage ============== */
.stage {
  display: flex;
  flex-direction: column;
  padding: 1.4rem 2rem 2rem;
  gap: 0.9rem;
  min-width: 0;
}

/* Header */
.header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
}
.header-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--cherry-deep);
}
.header-ch {
  padding: 3px 10px;
  background: var(--cherry-glass);
  color: var(--cherry-deep);
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
}
.header-counter {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* SVG stage */
.svg-wrap {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 12px;
  box-shadow: 0 1px 3px rgba(170,17,65,0.04);
  padding: 1rem 1.2rem;
  position: relative;
}
.chapter-svg {
  width: 100%;
  height: auto;
  max-height: 68vh;
  display: none;
}
.chapter-svg.active { display: block; }

/* SVG element visibility — controlled by data-step */
[data-step] {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 320ms ease, transform 320ms ease;
  pointer-events: none;
}
[data-step].visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* Caption card */
.caption {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-left: 4px solid var(--cherry);
  border-radius: 10px;
  padding: 0.85rem 1.1rem;
  min-height: 78px;
}
.caption-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--cherry-deep);
  margin-bottom: 0.25rem;
}
.caption-body {
  font-size: 0.85rem;
  color: var(--text-primary);
  line-height: 1.55;
}
.caption-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82em;
  background: var(--cherry-glass);
  color: var(--cherry-deep);
  padding: 1px 5px;
  border-radius: 4px;
}
.caption-body em {
  font-style: normal;
  color: var(--text-muted);
  font-size: 0.78em;
  margin-left: 0.3em;
}
.caption-body table {
  border-collapse: collapse;
  margin: 0.6rem 0;
  font-size: 0.8rem;
  width: 100%;
}
.caption-body th, .caption-body td {
  border: 1px solid var(--rule);
  padding: 5px 9px;
  text-align: left;
  vertical-align: top;
}
.caption-body th {
  background: var(--violet-soft);
  color: var(--violet);
  font-weight: 700;
}

/* Deep-dive: references + rust code */
.extras {
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}
.extras:empty { display: none; }
.extras.two-col {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
}
@media (max-width: 1100px) {
  .extras.two-col { grid-template-columns: 1fr; }
}
.extras-card {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 0.9rem 1.1rem;
  font-size: 0.82rem;
}
.extras-card.refs { border-left: 3px solid var(--violet); }
.extras-card.code { border-left: 3px solid var(--green); padding: 0; overflow: hidden; }
.extras-card h4 {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
  margin-bottom: 0.55rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.extras-card.refs h4 { color: var(--violet); }
.extras-card.code h4 {
  color: var(--green);
  padding: 0.7rem 1rem 0.4rem;
  margin-bottom: 0;
}
.extras-card.refs ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.extras-card.refs li {
  font-size: 0.8rem;
  line-height: 1.45;
}
.extras-card.refs a {
  color: var(--cherry-deep);
  text-decoration: none;
  border-bottom: 1px dashed var(--cherry-pink);
}
.extras-card.refs a:hover {
  color: var(--cherry);
  border-bottom-style: solid;
}
.extras-card.refs .ref-note {
  color: var(--text-muted);
  font-size: 0.72rem;
  margin-left: 0.4em;
}
.extras-card.code pre {
  margin: 0;
  padding: 0.4rem 1rem 0.9rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.74rem;
  line-height: 1.55;
  color: var(--text-primary);
  overflow-x: auto;
  white-space: pre;
  background: linear-gradient(to bottom, #ffffff, #fafff7);
}
.extras-card.code .kw { color: var(--violet); font-weight: 600; }
.extras-card.code .ty { color: var(--teal); }
.extras-card.code .fn { color: var(--cherry); }
.extras-card.code .cm { color: var(--text-muted); font-style: italic; }
.extras-card.code .str { color: var(--amber); }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
}
.controls button {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 8px 18px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.15s ease;
}
.controls button:hover:not(:disabled) {
  border-color: var(--cherry);
  color: var(--cherry-deep);
  background: var(--cherry-glass);
}
.controls button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.controls button.primary {
  background: var(--cherry);
  color: white;
  border-color: var(--cherry);
}
.controls button.primary:hover:not(:disabled) {
  background: var(--cherry-deep);
  color: white;
}
.controls button.ghost {
  border: none;
  color: var(--text-muted);
}
.controls .hint {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-left: 0.8rem;
}

/* ============== Common SVG styles ============== */
.svg-text { font-family: 'Noto Sans SC', sans-serif; }
.svg-mono { font-family: 'JetBrains Mono', monospace; }

/* Reusable SVG classes */
.actor-cherry { fill: var(--cherry-glass); stroke: var(--cherry); }
.actor-teal   { fill: var(--teal-soft); stroke: var(--teal); }
.actor-red    { fill: var(--red-soft); stroke: var(--red-deep); }
.actor-violet { fill: var(--violet-soft); stroke: var(--violet); }
.actor-amber  { fill: var(--amber-soft); stroke: var(--amber); }
.actor-green  { fill: var(--green-soft); stroke: var(--green); }

.label-cherry { fill: var(--cherry-deep); }
.label-teal   { fill: var(--teal); }
.label-red    { fill: var(--red-deep); }
.label-violet { fill: var(--violet); }
.label-amber  { fill: var(--amber); }
.label-green  { fill: var(--green); }
.label-slate  { fill: var(--slate); }
.label-muted  { fill: var(--text-muted); }

/* Sub-step animations: pulse for emphasis */
@keyframes pulse-glow {
  0%, 100% { filter: drop-shadow(0 0 0 transparent); }
  50% { filter: drop-shadow(0 0 6px var(--cherry-soft)); }
}
.pulse { animation: pulse-glow 2.4s ease infinite; }

/* Responsive */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sidebar { display: none; }
  .stage { padding: 1rem; }
}
</style>
</head>
<body>
<div class="app">
  <!-- ============== Sidebar ============== -->
  <aside class="sidebar">
    <div class="brand">🔐 ZKP · 渐进版本</div>
    <div class="brand-sub">零基础渐进教程 · 17 步</div>

    <div class="chap" data-ch="1">
      <div class="chap-name"><span class="num">CH1</span> 直觉</div>
      <div class="dots" data-ch-dots="1"></div>
    </div>
    <div class="chap" data-ch="2">
      <div class="chap-name"><span class="num">CH2</span> 三大性质</div>
      <div class="dots" data-ch-dots="2"></div>
    </div>
    <div class="chap" data-ch="3">
      <div class="chap-name"><span class="num">CH3</span> Schnorr 协议</div>
      <div class="dots" data-ch-dots="3"></div>
    </div>
    <div class="chap" data-ch="4">
      <div class="chap-name"><span class="num">CH4</span> 算术化 + Commitment</div>
      <div class="dots" data-ch-dots="4"></div>
    </div>
    <div class="chap" data-ch="5">
      <div class="chap-name"><span class="num">CH5</span> SNARK / STARK</div>
      <div class="dots" data-ch-dots="5"></div>
    </div>
    <div class="chap" data-ch="6">
      <div class="chap-name"><span class="num">CH6</span> 应用与回望</div>
      <div class="dots" data-ch-dots="6"></div>
    </div>
  </aside>

  <!-- ============== Stage ============== -->
  <main class="stage">
    <header class="header">
      <span class="header-ch" id="header-ch">CH1</span>
      <h1 class="header-title" id="header-title">直觉</h1>
      <span class="header-counter" id="header-counter">Step 1 / 17</span>
    </header>

    <section class="svg-wrap">

      <!-- ============================================================
           Ch1 — 直觉
           ============================================================ -->
      <svg class="chapter-svg" data-ch="1" viewBox="0 0 1100 520" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arr-violet1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d28d9"/>
          </marker>
          <marker id="arr-green1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
          </marker>
          <marker id="arr-amber1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
          </marker>
        </defs>

        <!-- Prover (violet stick figure) -->
        <g data-step="1">
          <circle cx="140" cy="240" r="44" class="actor-violet" stroke-width="2"/>
          <text x="140" y="246" text-anchor="middle" font-size="22" font-weight="700" class="label-violet">P</text>
          <text x="140" y="305" text-anchor="middle" font-size="14" font-weight="600" class="label-violet">Prover · 证明者</text>
          <text x="140" y="324" text-anchor="middle" font-size="11" class="label-muted">"我知道某个秘密 X"</text>
        </g>

        <!-- Verifier (green) -->
        <g data-step="1">
          <circle cx="960" cy="240" r="44" class="actor-green" stroke-width="2"/>
          <text x="960" y="246" text-anchor="middle" font-size="22" font-weight="700" class="label-green">V</text>
          <text x="960" y="305" text-anchor="middle" font-size="14" font-weight="600" class="label-green">Verifier · 验证者</text>
          <text x="960" y="324" text-anchor="middle" font-size="11" class="label-muted">"那你证明给我看"</text>
        </g>

        <!-- Big central question (Step 1 only) -->
        <g data-step="1" data-step-end="1">
          <rect x="240" y="180" width="620" height="120" rx="14" fill="#fff" stroke="#6d28d9" stroke-width="2"/>
          <text x="550" y="218" text-anchor="middle" font-size="20" font-weight="700" class="label-violet">I know X.</text>
          <text x="550" y="252" text-anchor="middle" font-size="20" font-weight="700" class="label-violet">How do I prove it</text>
          <text x="550" y="282" text-anchor="middle" font-size="20" font-weight="700" class="label-violet">without telling you X?</text>
        </g>

        <!-- Step 2: Ali Baba cave -->
        <g data-step="2">
          <!-- Cave entrance -->
          <ellipse cx="550" cy="290" rx="220" ry="40" fill="none" stroke="#475569" stroke-width="2"/>
          <text x="550" y="252" text-anchor="middle" font-size="13" class="label-slate" font-weight="600">Ali Baba 洞穴</text>
          <!-- Two paths A/B -->
          <path d="M 380 300 Q 460 380 540 380" stroke="#6d28d9" stroke-width="2" fill="none"/>
          <path d="M 720 300 Q 640 380 560 380" stroke="#6d28d9" stroke-width="2" fill="none"/>
          <text x="380" y="320" text-anchor="middle" font-size="12" class="label-violet" font-weight="600">路径 A</text>
          <text x="720" y="320" text-anchor="middle" font-size="12" class="label-violet" font-weight="600">路径 B</text>
          <!-- Magic door (amber lock in middle) -->
          <rect x="530" y="372" width="40" height="40" rx="6" class="actor-amber" stroke-width="2"/>
          <text x="550" y="398" text-anchor="middle" font-size="20">🔒</text>
          <text x="550" y="430" text-anchor="middle" font-size="11" class="label-amber" font-weight="600">魔法门 · 需要密码</text>
          <text x="550" y="446" text-anchor="middle" font-size="10" class="label-muted">只有知道密码才能从一边穿到另一边</text>
          <!-- Prover at entrance -->
          <circle cx="550" cy="200" r="14" class="actor-violet" stroke-width="2"/>
          <text x="550" y="205" text-anchor="middle" font-size="11" font-weight="700" class="label-violet">P</text>
          <text x="550" y="180" text-anchor="middle" font-size="11" class="label-violet">入口</text>
        </g>

        <!-- Step 2: Verifier outside, calling out -->
        <g data-step="2">
          <line x1="916" y1="250" x2="780" y2="290" stroke="#15803d" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr-green1)"/>
          <text x="850" y="245" text-anchor="middle" font-size="11" class="label-green" font-weight="600">挑战: 从 X 路出来!</text>
        </g>

        <!-- Step 2 extra: round counter showing 2^-n cheating probability -->
        <g data-step="2">
          <rect x="80" y="430" width="200" height="60" rx="10" fill="#fff" stroke="#475569" stroke-width="1"/>
          <text x="180" y="450" text-anchor="middle" font-size="11" class="label-slate" font-weight="600">骗子蒙混概率</text>
          <text x="180" y="470" text-anchor="middle" font-size="12" class="svg-mono label-red">n 轮后 ≤ 2⁻ⁿ</text>
          <text x="180" y="484" text-anchor="middle" font-size="9" class="label-muted">10 轮 ≈ 0.1%, 20 轮 ≈ 0.0001%</text>
        </g>
        <g data-step="2">
          <rect x="820" y="430" width="200" height="60" rx="10" fill="#fff" stroke="#475569" stroke-width="1"/>
          <text x="920" y="450" text-anchor="middle" font-size="11" class="label-slate" font-weight="600">Verifier 学到了什么?</text>
          <text x="920" y="470" text-anchor="middle" font-size="12" class="label-green">仅: "P 知道密码"</text>
          <text x="920" y="484" text-anchor="middle" font-size="9" class="label-muted">密码本身: 一无所知</text>
        </g>

        <!-- Hints on top -->
        <g data-step="1" data-step-end="1">
          <text x="550" y="60" text-anchor="middle" font-size="13" class="label-muted">证明知识 vs 出示知识 —— 想个反直觉的中间路</text>
        </g>
        <g data-step="2" data-step-end="2">
          <text x="550" y="60" text-anchor="middle" font-size="13" class="label-muted">Quisquater 1990 · Ali Baba 洞穴：用 challenge-response 把"知识"概率性地证明出来</text>
        </g>
      </svg>

      <!-- ============================================================
           Ch2 — 三大性质
           ============================================================ -->
      <svg class="chapter-svg" data-ch="2" viewBox="0 0 1100 520" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arr-green2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
          </marker>
          <marker id="arr-amber2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
          </marker>
          <marker id="arr-violet2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d28d9"/>
          </marker>
        </defs>

        <!-- Property card 1: Completeness -->
        <g data-step="3">
          <rect x="80" y="120" width="320" height="170" rx="14" class="actor-green" stroke-width="2"/>
          <text x="240" y="152" text-anchor="middle" font-size="22" font-weight="700" class="label-green">✓</text>
          <text x="240" y="182" text-anchor="middle" font-size="16" font-weight="700" class="label-green">Completeness</text>
          <text x="240" y="202" text-anchor="middle" font-size="11" class="label-muted">完备性 · 诚实者一定通过</text>
          <rect x="100" y="218" width="280" height="28" rx="6" fill="#fff" stroke="#15803d" stroke-width="1"/>
          <text x="240" y="237" text-anchor="middle" font-size="12" class="svg-mono label-green">Pr[V accepts | true stmt] ≥ 1 − ε</text>
          <text x="240" y="266" text-anchor="middle" font-size="10" class="label-muted">真陈述 + 诚实 Prover → 几乎一定接受</text>
        </g>

        <!-- Property card 2: Soundness -->
        <g data-step="4">
          <rect x="400" y="120" width="320" height="170" rx="14" class="actor-amber" stroke-width="2"/>
          <text x="560" y="152" text-anchor="middle" font-size="22" font-weight="700" class="label-amber">✗</text>
          <text x="560" y="182" text-anchor="middle" font-size="16" font-weight="700" class="label-amber">Soundness</text>
          <text x="560" y="202" text-anchor="middle" font-size="11" class="label-muted">可靠性 · 假陈述骗不过</text>
          <rect x="420" y="218" width="280" height="28" rx="6" fill="#fff" stroke="#b45309" stroke-width="1"/>
          <text x="560" y="237" text-anchor="middle" font-size="12" class="svg-mono label-amber">Pr[V accepts | false stmt] ≤ 2⁻ⁿ</text>
          <text x="560" y="266" text-anchor="middle" font-size="10" class="label-muted">没 secret 的人 n 轮挑战通过率指数级衰减</text>
        </g>

        <!-- Step 4 challenge grid (10 boxes) -->
        <g data-step="4">

  { ch: 1, title: '朴素问题：怎么证明"我知道"', body: '日常生活里有一类很奇怪的需求：<strong>我想让你相信我知道某件事，但我又不愿告诉你那件事本身</strong>。<br>例子：<br>• 我知道你账户的密码（其实是想证明我是合法的你）<br>• 我有数独的解（想证明谜题确实可解，但又不想白送答案）<br>• 我账上有 1 ETH（想证明能付款，但不想暴露余额）<br>• 我满 18 岁（想证明合法，但不想出示生日 / 身份证号）<br>密码学把这两个角色定下来：<code>Prover · 证明者</code>（紫色 P，知道某个秘密 X）和 <code>Verifier · 验证者</code>（绿色 V，要被说服 X 存在）。<br>难点是：直接交出秘密就违背了初心 —— 我们要的是一种<strong>"既能让对方相信，又什么都不告诉对方"</strong>的对话方式。<br>这个看似矛盾的目标，正是接下来 17 步要逐层拆解的全部内容。<em>反直觉吗？是的，这正是 ZKP 的魅力所在。</em>' },
  { ch: 1, title: 'Ali Baba 洞穴 · 经典直觉', body: '1990 年 Quisquater 等人写了一篇专门面向小孩的论文 <em>How to Explain Zero-Knowledge Protocols to Your Children</em>，给出了沿用至今的"洞穴"模型。<br>洞穴有一条主道，进去后分叉成 A 路和 B 路；A 和 B 在底端被一道魔法门连通，知道密码的人才能穿门。<br>协议：① Prover 进洞，随便挑 A 或 B 走到底；② Verifier 站在洞口喊出"从 X 路出来"；③ Prover 必须从 X 路出来。<br>不知道密码的骗子有 1/2 几率走对路 —— 但反复 n 轮，骗子蒙过的概率 <code>2⁻ⁿ</code> 几何衰减。<br>关键洞察：Verifier 全程没看到密码本身，只看到"挑战 → 回应"的序列。这就是 ZKP 的雏形。' },
  // Ch2
  { ch: 2, title: 'Completeness · 诚实者一定通过', body: 'ZKP 的第一根支柱：<strong>如果陈述是真的、Prover 是诚实的，那么 Verifier 几乎一定接受</strong>。<br>形式化：<code>Pr[V accepts | true stmt and honest P] ≥ 1 − ε</code>。这里 ε 是允许的"协议错误"概率，常见取 <code>ε ≤ 2⁻¹²⁸</code>，工程上视同 0。<br>这条性质看似废话，其实约束了"协议正确性"：算法不能有 bug 让真陈述被拒。<br>反面教训：早期一些 SNARK 实现因为 hash 域选错、约束写漏，出现"诚实 Prover 偶尔被拒"的 bug —— 完备性挂掉，整套协议作废。' },
  { ch: 2, title: 'Soundness · 假命题骗不过', body: '第二根支柱：<strong>没有 witness（秘密见证）的人，无论怎么努力，通过 Verifier 的概率都极低</strong>。<br>形式化：<code>Pr[V accepts | false stmt] ≤ 2⁻ⁿ</code>。每多一轮 challenge，骗子的逃脱概率减半。<br>右图：10 轮挑战中，假 Prover 平均一半失手；100 轮后通过率 ≈ 2⁻¹⁰⁰，比"宇宙中随便挑个原子"还稀有。<br>更细的分类：<br>• <code>Statistical soundness</code>：即使无限算力也骗不过<br>• <code>Computational soundness</code>：只针对有限算力的攻击者<br>SNARK 多是 computational（依赖 DLP / pairing 假设），STARK 是 statistical（仅依赖 hash）。' },
  { ch: 2, title: 'Zero-Knowledge · 证完啥也没漏', body: '第三根支柱也是最难定义的：<strong>Verifier 在协议结束后，对 witness 一无所知</strong>。<br>怎么形式化"一无所知"？Goldwasser、Micali、Rackoff 1989 年提出 <code>Simulator paradigm · 模拟器范式</code>：<br>"如果存在一个不知道 witness 的算法 S（Simulator），它能造出一段对话，<strong>分布</strong>跟真实的 (P, V) 对话不可区分，那 Verifier 从真实对话里能学到的东西就 = 从 S 造的假对话里能学到的 = 0。"<br>三档严格度：<br>• <code>Perfect ZK</code>：分布完全相同<br>• <code>Statistical ZK</code>：分布统计不可区分<br>• <code>Computational ZK</code>：多项式时间区分不出（最常见）<br>另一个区分：<code>Honest-Verifier ZK</code>（HVZK，假设 V 守规矩）vs <code>Malicious-Verifier ZK</code>（即使 V 作弊也是 ZK）。' },
  // Ch3
  { ch: 3, title: 'Schnorr 三步握手', body: '现在把"诚实者通过 + 骗子通不过 + 不漏 witness"三件事在一个具体协议里实现 —— 这就是 1991 年 Schnorr 给出的原型，至今所有 ZKP 系统的基本构件。<br>设定：群 G 阶为素数 q，生成元 g。Prover 知道 witness <code>x</code>，公开陈述 <code>h = g^x</code>。<br>三步：<br>① <strong>commit</strong>：Prover 选随机 <code>r</code>，发出 <code>t = g^r</code>。<br>② <strong>challenge</strong>：Verifier 随机选 <code>c</code>，发回。<br>③ <strong>response</strong>：Prover 算 <code>s = r + c·x  (mod q)</code>，发出。<br>这种 "commit / challenge / response" 三段式叫 <code>Σ-protocol · Sigma 协议</code>，几乎所有现代 ZKP 都从它演化。<br><em>关键约束：随机数 r 必须每轮新鲜，重用会立刻泄漏 x（参见 PS3 ECDSA 事故）</em>' },
  { ch: 3, title: 'Verifier 检查方程', body: 'Verifier 拿到 (t, c, s) 后只做一件事：检查等式 <code>g^s ?= t · h^c</code>。<br>一行公式同时蕴含两个性质：<br>• <strong>Completeness</strong>：诚实 Prover 算 <code>g^s = g^(r+cx) = g^r · g^(cx) = t · h^c</code>，必然成立。<br>• <strong>Soundness</strong>：没有 x 的骗子要在收到 c 之后伪造 s 满足等式 —— 等价于解离散对数，<strong>计算上不可行</strong>。<br>注意：在 Schnorr 用的群里（如 Ed25519 或 secp256k1），群操作是加法，所以代码里看到的是 <code>g·s == t + h·c</code>（标量乘法），数学上完全等价。<br>这一行检查在比特币、以太坊、Tor 等系统里被反复运行了上万亿次。' },
  { ch: 3, title: 'Knowledge Soundness · 抽出 witness', body: 'Soundness 只保证"通过 = 知道"在概率上成立，更强的版本叫 <code>Knowledge Soundness · 知识可靠性</code>：存在一个 <code>Knowledge Extractor</code> 算法，能从一个能成功通过的 Prover 身上"撬出" witness。<br>Schnorr 的 extractor 极其优雅 —— 假设 Prover 用同一个 <code>t</code> 对两个不同 challenge <code>c₁, c₂</code> 都给出合法回答 <code>s₁, s₂</code>：<br><code>g^s₁ = t · h^c₁</code><br><code>g^s₂ = t · h^c₂</code><br>两式相除：<code>g^(s₁−s₂) = h^(c₁−c₂)</code>，即 <code>x = (s₁ − s₂) / (c₁ − c₂)  (mod q)</code>。<br>这叫 <code>Special Soundness · 特殊可靠性</code>：Σ-protocol 的标志性结构。它把"通过证明"等价于"真的拥有 witness"，于是协议变成 <code>PoK · Proof of Knowledge · 知识证明</code>，比单纯的语言成员关系强得多。' },
  { ch: 3, title: 'Fiat–Shamir 拍扁', body: '前面三步握手要双方在线交互，挺烦。1986 年 Fiat 和 Shamir 提出一个石破天惊的简化：<strong>用 hash 函数模拟 Verifier</strong>。<br>原本 Verifier 在第二步随机抛硬币给出 c —— 现在 Prover 自己算 <code>c = H(g, h, t)</code>，因为 hash 输出"看起来"是均匀随机的。<br>这一改造叫 <code>Fiat-Shamir transform · Fiat-Shamir 变换</code>，安全性依赖 <code>Random Oracle Model · 随机预言机模型</code>（把 hash 理想化为真随机函数）。<br>结果：<br>• 三轮交互 → <strong>一条非交互证明 π = (t, s)</strong><br>• Verifier 可以是"任何人，任何时候"：把 π 贴到链上，所有人独立验证<br>• Schnorr signature、EdDSA、Bulletproofs、Groth16 全靠它<br><strong>陷阱</strong>：transcript 必须哈希进所有 public input（g, h, statement…），少哈一项就会出现"弱 Fiat-Shamir"漏洞 —— 2023 年 PlonK 系列就栽过几次。' },
  // Ch4
  { ch: 4, title: 'Pedersen Commitment · 信封', body: '在把"知道 x" 推广到"知道一段复杂计算的 witness"前，先认识所有 ZKP 系统都离不开的"信封" —— <code>Pedersen Commitment</code>（Pedersen 1991）。<br>定义：选两个生成元 g, h（h 的离散对数没人知道），承诺 <code>c = g^x · h^r</code>，其中 r 是均匀随机的盲化因子。<br>两个对偶性质：<br>• <strong>Hiding · 隐藏</strong>：r 是均匀随机的，所以 c 在群里也均匀随机 —— 看 c 推不出 x 的任何信息（信息论意义上，perfect hiding）。<br>• <strong>Binding · 绑定</strong>：想找另一对 (x′, r′) 使 c 不变，等价于解离散对数 —— 计算上做不到（computational binding）。<br>对比 hash commitment（c = H(x ‖ r)）：hash 是计算 hiding + 计算 binding；Pedersen 是 perfect hiding + 计算 binding，且支持<strong>同态加</strong>（c₁·c₂ 是 x₁+x₂ 的承诺）—— 这个加法同态是 Bulletproofs / Groth16 等的关键基石。<br>"先 commit、后 prove" 是 ZKP 的固定开场白。' },
  { ch: 4, title: '算术化第一半 · 电路 → R1CS', body: '"我知道某个 x 满足复杂条件"该怎么转成 ZKP 能处理的语言？答案是 <code>arithmetization · 算术化</code>：把任意 NP 关系翻译成有限域 F 上的代数约束。<br>第一步：把程序拆成 <code>算术电路</code>，由 + × 门组成（其它运算如 AND、XOR、比较都可化为这两个）。<br>第二步：把电路打平成 <code>R1CS · Rank-1 Constraint System</code>（rank-1 约束系统）。每个乘法门写成一条形如 <code>(A·s) ∘ (B·s) = (C·s)</code> 的约束（∘ 是 Hadamard 逐元素积，s 是把 1、public input、witness 拼成的"完整赋值向量"）。<br>整个电路就是 <code>m</code> 条这样的约束。"知道 witness" ⟺ "能找到一个 s 让所有约束同时成立"。<br>arkworks 的 <code>ConstraintSystem</code> trait 是 Rust 生态的标准 API：你写 high-level 逻辑，框架自动产 R1CS 矩阵 A, B, C。<br>例子：要证 "我知道 y 的平方根 x"，约束是 <code>x · x = y</code>，向量 <code>s = [1, y, x]</code>，矩阵就一行。' },
  { ch: 4, title: '算术化第二半 · R1CS → 多项式', body: '直接把 m 条 R1CS 约束扔给 Verifier 检查 —— 那他要做 m 次乘法，跟你重新跑电路一样慢，毫无收益。<br>关键技巧：<strong>把"全部约束都成立"打包成"一个多项式恒等式"</strong>。<br>对每条约束，用 Lagrange 插值在域 F 上构造多项式 A(X), B(X), C(X)（在第 i 个评估点 ω^i 处分别等于第 i 条约束的对应系数与 s 的内积）。<br>"所有约束都成立" ⟺ <code>A(X)·B(X) − C(X) ≡ 0  on {ω^0, …, ω^(m−1)}</code> ⟺ 这个差是 <code>vanishing polynomial Z(X) = ∏(X − ω^i)</code> 的倍数 ⟺ 存在商多项式 H(X) 使 <code>A(X)B(X) − C(X) = H(X)·Z(X)</code>。<br>检查一个多项式恒等式怎么做？Verifier 随机选一个点 z ∈ F，让 Prover 给出各多项式在 z 处的取值并验证等式。<br><code>Schwartz-Zippel lemma</code>：两个度数 ≤ d 的不同多项式在随机点取值相同的概率 ≤ d / |F|。当 |F| ≈ 2²⁵⁶ 时，错误概率小到可以忽略。<br>这就是 <code>polynomial IOP · 多项式交互预言机证明</code>思想 —— 现代 SNARK / STARK 的共同骨架。' },
  // Ch5
  { ch: 5, title: 'zk-SNARK · Groth16', body: '<code>SNARK = Succinct Non-interactive ARgument of Knowledge · 简洁非交互知识论证</code>。<br>四个字拆开：<br>• <strong>S·Succinct</strong>：proof 极小（数百字节），verify 极快（毫秒级），与 witness 大小无关<br>• <strong>N·Non-interactive</strong>：一条 proof，谁都能离线验证（靠 Fiat-Shamir 或 CRS）<br>• <strong>AR·ARgument</strong>：仅对计算受限攻击者可靠（vs Proof，对无限算力可靠）<br>• <strong>K·of Knowledge</strong>：通过证明 ⟹ 真的拥有 witness（特殊可靠性）<br>2016 年的 <code>Groth16</code> 是工业宠儿：3 个群元素 ≈ 200 bytes，验证只需 3 次 pairing。代价：每条电路要做一次 <code>Trusted Setup · 可信初始化</code> 仪式，产出 CRS（Common Reference String）；仪式中产生的"toxic waste"必须被销毁，否则持有者能凭空伪造证明。<br>解决办法：用 <code>MPC ceremony</code>（多方计算仪式），多人轮流贡献随机性，只要有一人诚实销毁自己那份，CRS 就安全 —— Zcash Sapling 和 Filecoin 都办过千人级的仪式。<br>下一代如 <code>PLONK</code>、<code>Marlin</code> 用 <code>universal setup</code>，一次仪式可被所有电路复用，避免每加新电路都重新办仪式。' },
  { ch: 5, title: 'zk-STARK · 文字对比卡', body: '<code>STARK = Scalable Transparent ARgument of Knowledge · 可扩展透明知识论证</code>，2018 年 Ben-Sasson 等人推出，从设计上摆脱 trusted setup。<br>核心机制：<br>• <strong>FRI · Fast Reed-Solomon IOP of Proximity</strong>：用 Reed-Solomon 编码 + Merkle 树证明多项式低次性<br>• 仅依赖 hash 函数（SHA-256 / Blake3 / Rescue），不需要 pairing 或离散对数假设<br>• 因此 <strong>post-quantum 安全</strong>：量子计算机来了也不破<br><strong>SNARK vs STARK 详细对比：</strong><br><table><tr><th>维度</th><th>zk-SNARK (Groth16/PLONK)</th><th>zk-STARK</th></tr><tr><td>Trusted Setup</td><td>需要 (Groth16) 或 universal (PLONK)</td><td>无 · transparent</td></tr><tr><td>Proof 大小</td><td>~200 B – 几 KB</td><td>~50 KB – 几百 KB</td></tr><tr><td>Verifier 时间</td><td>~1–10 ms</td><td>~10–100 ms</td></tr><tr><td>Prover 时间</td><td>较快</td><td>稍慢</td></tr><tr><td>密码学假设</td><td>pairing / DLP</td><td>仅 hash</td></tr><tr><td>Post-quantum</td><td>否</td><td>是</td></tr><tr><td>主流实现</td><td>arkworks · circom · snarkjs · Halo2</td><td>Winterfell · StarkWare · RISC Zero · Plonky2</td></tr></table>选型直觉：链上空间紧 → SNARK；要无 setup / 抗量子 / 大电路 → STARK。' },
  // Ch6
  { ch: 6, title: 'Zcash 隐私交易', body: '2016 年上线的 Zcash 是 ZKP 在公链落地的第一个杀手级应用。<br>问题：比特币所有交易（from / to / amount）全公开，链上分析公司能轻易推断地址画像。<br>Zcash 的 <code>shielded transaction</code> 把这三个字段全部加密，但仍允许公网验证：<br>• <strong>余额守恒</strong>：input 总额 = output 总额（不能凭空印钱）<br>• <strong>没有双花</strong>：每个 input 用一次性 <code>nullifier</code> 标记，重用立刻被链拒绝<br>• <strong>所有权</strong>：Spender 真的持有那笔 note 的私钥<br>实现：每笔 input 是一个 <code>note commitment</code>（Pedersen-style），存进一棵全网共识的 <code>note commitment tree</code>（增量 Merkle 树）；交易里附一个 zk-SNARK 证明"我知道某棵树叶子的 opening + 满足上述约束"。<br>升级路线：Sprout（BCTV14） → Sapling（Groth16 + Jubjub 曲线，proof 200B、prove 几秒） → Orchard（Halo2，无 trusted setup）。<br>设计教训：第一代 Sprout 因 BCTV14 论文里一个细节漏洞，导致 2018 年发现了"无限通胀"漏洞 —— ZKP 工程对实现细节极度敏感。' },
  { ch: 6, title: 'ZK-Rollup + DECO', body: '两个最近五年最吃香的 ZKP 工业应用：<br><br><strong>ZK-Rollup（L2 扩容）</strong><br>以太坊主网每秒只能处理 ~15 笔交易、gas 贵。L2 方案把 1000 笔交易在链下批量执行，只把 (旧状态根, 新状态根, zk-SNARK 证明) 上交 L1。L1 一次 verify 就确认整批合法。<br>对比 <code>optimistic rollup</code>（先信后挑战，要等 7 天 challenge window），<code>validity rollup</code>（= ZK-Rollup）即时 finality，且天然抗 censorship。<br>代表：zkSync · StarkNet · Polygon zkEVM · Scroll · Linea。Vitalik 称之为以太坊扩容的"endgame"。<br><br><strong>DECO（隐私预言机，Chainlink）</strong><br>区块链合约想用链下数据（"老王银行账户余额 ≥ 100 万"），但又不想公开余额。DECO 让 user 和 oracle 节点跑一段三方 TLS 改造协议：oracle 拿到来自 HTTPS 服务器的<strong>响应密文 + 一个零知识证明"该响应满足某条件"</strong>，原始数据不上链，证明上链。<br>这把 ZKP 的应用从纯加密货币延展到 DeFi 信用、去中心化身份、合规、保险定价等场景。论文出处：Ari Juels et al. 2020；产品集成在 Chainlink 数据预言机网络。' },
  { ch: 6, title: '🎉 回望与下一步', body: '走完 17 步，你手里已经握着一张完整的 ZKP 拼图：<br>① 直觉（Ali Baba 洞穴）<br>② 三大性质（Completeness / Soundness / Zero-Knowledge）<br>③ Schnorr 协议（commit-challenge-response + Special Soundness + 抽 witness）<br>④ Fiat–Shamir 变换（交互 → 非交互）<br>⑤ Pedersen Commitment（hiding + binding 信封）<br>⑥ 算术化（电路 → R1CS → 多项式 + Schwartz-Zippel）<br>⑦ SNARK（Groth16，trusted setup，~200 B proof） vs STARK（FRI，transparent，post-quantum）<br>⑧ 应用（Zcash 隐私交易 / ZK-Rollup 扩容 / DECO 隐私预言机）<br><br><strong>继续学习路线：</strong><br>• 教科书：Justin Thaler 《Proofs, Arguments, and Zero-Knowledge》（免费 PDF，公认最完整入门）<br>• 实战：arkworks 教程、circom + snarkjs、Plonky2 / Halo2 demo<br>• 社群：ZK Hack、ZK Whiteboard Sessions、IACR ePrint<br>• 项目：跟一个 zkVM（RISC Zero / SP1 / Jolt）跑通"hello, ZK"<br><br>想分享某一步给朋友？直接复制当前 URL，对方打开就停在同一步。' },
];

function renderExtras(step) {
  const el = document.getElementById('extras');
  const extra = STEP_EXTRAS[step] || {};
  let html = '';

  if (extra.refs && extra.refs.length) {
    html += '<div class="extras-card refs"><h4>📚 延伸阅读 · 原理出处</h4><ul>';
    for (const r of extra.refs) {
      const note = r.note ? `<span class="ref-note">— ${r.note}</span>` : '';
      html += `<li><a href="${r.url}" target="_blank" rel="noopener">${r.title}</a>${note}</li>`;
    }
    html += '</ul></div>';
  }

  if (extra.code) {
    html += `<div class="extras-card code"><h4>🦀 Rust 骨架</h4><pre>${extra.code}</pre></div>`;
  }

  // Single-card → stretch full width; both cards → keep 2-col grid
  el.classList.toggle('two-col', !!(extra.refs && extra.refs.length && extra.code));
  el.innerHTML = html;
}

// Build dots in sidebar
function buildDots() {
  const groups = {};
  STEPS.forEach((s, i) => {
    (groups[s.ch] ||= []).push(i + 1);
  });
  Object.entries(groups).forEach(([ch, steps]) => {
    const wrap = document.querySelector(`.dots[data-ch-dots="${ch}"]`);
    if (!wrap) return;
    steps.forEach(n => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.dataset.step = n;
      d.title = `Step ${n}`;
      d.addEventListener('click', () => goTo(n));
      wrap.appendChild(d);
    });
  });
}

let currentStep = 1;

function goTo(step) {
  step = Math.max(1, Math.min(TOTAL, step));
  currentStep = step;
  const cur = STEPS[step - 1];

  // Activate the right chapter SVG
  document.querySelectorAll('.chapter-svg').forEach(svg => {
    svg.classList.toggle('active', +svg.dataset.ch === cur.ch);
  });

  // Apply visibility to all data-step elements
  document.querySelectorAll('[data-step]').forEach(el => {
    const start = +el.dataset.step;
    const end = el.dataset.stepEnd ? +el.dataset.stepEnd : 999;
    const visible = step >= start && step <= end;
    // Defer to next frame so transition triggers
    requestAnimationFrame(() => el.classList.toggle('visible', visible));
  });

  // Update header
  document.getElementById('header-ch').textContent = 'CH' + cur.ch;
  document.getElementById('header-title').textContent = cur.title;
  document.getElementById('header-counter').textContent = `Step ${step} / ${TOTAL}`;

  // Update caption
  document.getElementById('caption-title').textContent = cur.title;
  document.getElementById('caption-body').innerHTML = cur.body;

  // Render references + rust code
  renderExtras(step);

  // Update dots (active / read)
  document.querySelectorAll('.dot').forEach(d => {
    const n = +d.dataset.step;
    d.classList.toggle('active', n === step);
    d.classList.toggle('read', n < step);
  });

  // Update controls
  document.getElementById('btn-prev').disabled = step === 1;
  document.getElementById('btn-next').disabled = step === TOTAL;

  // Sync URL
  if (history.replaceState) {
    history.replaceState(null, '', '#step-' + step);
  } else {
    location.hash = 'step-' + step;
  }
}

function initFromHash() {
  const m = location.hash.match(/step-(\d+)/);
  return m ? +m[1] : 1;
}

document.addEventListener('DOMContentLoaded', () => {
  buildDots();
  goTo(initFromHash());

  document.getElementById('btn-prev').addEventListener('click', () => goTo(currentStep - 1));
  document.getElementById('btn-next').addEventListener('click', () => goTo(currentStep + 1));
  document.getElementById('btn-replay').addEventListener('click', () => goTo(1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(currentStep - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); goTo(currentStep + 1); }
    if (e.key === 'Home')       { e.preventDefault(); goTo(1); }
    if (e.key === 'End')        { e.preventDefault(); goTo(TOTAL); }
  });

  window.addEventListener('hashchange', () => {
    const n = initFromHash();
    if (n !== currentStep) goTo(n);
  });
});
</script>
