<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN / 代理工具原理 · 零基础渐进教程</title>
<meta name="description" content="从包怎么离开你的电脑讲起，30 步推到 TUN 虚拟网卡、路由劫持、用户态分流、fake-ip、DNS 泄漏、Surge/Clash 配置对照。">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-page:        #fdfaf6;
  --bg-card:        #ffffff;
  --bg-soft-pink:   #fce4e4;
  --bg-term:        #1f2937;

  --text-primary:   #1f2937;
  --text-secondary: #6b7280;
  --text-muted:     #9ca3af;

  --cherry:         #aa1141;
  --cherry-deep:    #9a0036;
  --cherry-soft:    #ffa6a6;
  --cherry-pink:    #ea68b6;
  --cherry-glass:   #fce4e4;

  --teal:           #0e7490;
  --teal-soft:      #cffafe;
  --amber:          #b45309;
  --amber-soft:     #fef3c7;
  --green:          #15803d;
  --green-soft:     #dcfce7;
  --violet:         #6d28d9;
  --violet-soft:    #ede9fe;
  --slate:          #475569;
  --slate-soft:     #f1f5f9;
  --red-deep:       #b91c1c;
  --red-soft:       #fee2e2;

  --rule:           #e5e7eb;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', 'JetBrains Mono', -apple-system, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.6;
}

.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

.sidebar {
  background: var(--bg-card);
  border-right: 1px solid var(--rule);
  padding: 1.6rem 1.2rem;
  position: sticky; top: 0; height: 100vh; overflow-y: auto; align-self: start;
}
.brand { font-size: 1rem; font-weight: 700; color: var(--cherry-deep); margin-bottom: 0.3rem; }
.brand-sub { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 1.4rem; }
.back-home {
  display: block; font-size: 0.7rem; color: var(--text-muted); text-decoration: none;
  margin-bottom: 1.6rem; padding-bottom: 0.7rem; border-bottom: 1px dashed var(--rule);
}
.back-home:hover { color: var(--cherry); }
.chap { margin-bottom: 1rem; cursor: pointer; }
.chap-name {
  font-size: 0.75rem; font-weight: 600; color: var(--text-secondary);
  margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.4rem;
}
.chap-name .num { font-family: 'JetBrains Mono', monospace; color: var(--cherry); font-size: 0.7rem; }
.dots { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 0.1rem; }
.dot {
  width: 11px; height: 11px; border-radius: 50%;
  background: #fff;
  border: 1.5px solid #d1d5db;
  cursor: pointer; transition: all 0.2s ease;
}
.dot:hover { transform: scale(1.3); border-color: var(--cherry-pink); }
.dot.read {
  background: var(--cherry-soft);
  border-color: var(--cherry);
}
.dot.active {
  background: var(--cherry);
  border-color: var(--cherry);
  transform: scale(1.25);
  box-shadow: 0 0 0 3px var(--cherry-glass), 0 1px 4px rgba(170,17,65,0.4);
}

.stage { display: flex; flex-direction: column; padding: 1.4rem 2rem 2rem; gap: 0.85rem; min-width: 0; }

.header { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
.header-title { font-size: 1.1rem; font-weight: 700; color: var(--cherry-deep); }
.header-ch { padding: 3px 10px; background: var(--cherry-glass); color: var(--cherry-deep); border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
.header-counter { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-muted); }

.svg-wrap {
  background: var(--bg-card); border: 1px solid var(--rule); border-radius: 12px;
  box-shadow: 0 1px 3px rgba(170,17,65,0.04); padding: 0.9rem 1.1rem; position: relative;
}
.chapter-svg { width: 100%; height: auto; max-height: 70vh; display: none; }
.chapter-svg.active { display: block; }

[data-step] {
  opacity: 0; transform: translateY(6px);
  transition: opacity 320ms ease, transform 320ms ease; pointer-events: none;
}
[data-step].visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

.caption {
  background: var(--bg-card); border: 1px solid var(--rule); border-left: 4px solid var(--cherry);
  border-radius: 10px; padding: 0.85rem 1.1rem; min-height: 78px;
}
.caption-title { font-size: 0.95rem; font-weight: 700; color: var(--cherry-deep); margin-bottom: 0.25rem; }
.caption-body { font-size: 0.85rem; color: var(--text-primary); line-height: 1.6; }
.caption-body code {
  font-family: 'JetBrains Mono', monospace; font-size: 0.82em;
  background: var(--cherry-glass); color: var(--cherry-deep);
  padding: 1px 5px; border-radius: 4px;
}
.caption-body em { font-style: normal; color: var(--text-muted); font-size: 0.78em; margin-left: 0.3em; }
.caption-body strong { color: var(--cherry-deep); }

.extras { display: flex; flex-direction: column; gap: 0.85rem; }
.extras:empty { display: none; }
.extras.two-col { display: grid; grid-template-columns: 1fr 1.35fr; }
@media (max-width: 1100px) { .extras.two-col { grid-template-columns: 1fr; } }

.extras-card {
  background: var(--bg-card); border: 1px solid var(--rule);
  border-radius: 10px; padding: 0.85rem 1.1rem; font-size: 0.82rem;
}
.extras-card.refs { border-left: 3px solid var(--violet); }
.extras-card.shell { border-left: 3px solid var(--teal); padding: 0; overflow: hidden; }
.extras-card.config { border-left: 3px solid var(--amber); padding: 0; overflow: hidden; }
.extras-card h4 {
  font-size: 0.76rem; font-weight: 700; letter-spacing: 0.02em;
  margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem;
}
.extras-card.refs h4 { color: var(--violet); }
.extras-card.shell h4 { color: var(--teal); padding: 0.7rem 1rem 0.4rem; margin-bottom: 0; }
.extras-card.config h4 { color: var(--amber); padding: 0.7rem 1rem 0.4rem; margin-bottom: 0; }

.extras-card.refs ul { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; }
.extras-card.refs li { font-size: 0.8rem; line-height: 1.5; }
.extras-card.refs a {
  color: var(--cherry-deep); text-decoration: none;
  border-bottom: 1px dashed var(--cherry-pink);
}
.extras-card.refs a:hover { color: var(--cherry); border-bottom-style: solid; }
.extras-card.refs .ref-note { color: var(--text-muted); font-size: 0.72rem; margin-left: 0.4em; }

.extras-card.shell pre {
  margin: 0; padding: 0.45rem 1rem 0.9rem; font-family: 'JetBrains Mono', monospace;
  font-size: 0.74rem; line-height: 1.6; overflow-x: auto; white-space: pre;
  background: var(--bg-term); color: #e5e7eb; border-radius: 0;
}
.extras-card.shell .prompt { color: var(--cherry-pink); }
.extras-card.shell .cmd { color: #fde68a; font-weight: 600; }
.extras-card.shell .out { color: #cbd5e1; }
.extras-card.shell .hl { color: #fca5a5; font-weight: 600; }
.extras-card.shell .cm { color: var(--text-muted); font-style: italic; }

.extras-card.config pre {
  margin: 0; padding: 0.45rem 1rem 0.9rem; font-family: 'JetBrains Mono', monospace;
  font-size: 0.74rem; line-height: 1.6; overflow-x: auto; white-space: pre;
  background: linear-gradient(to bottom, #fffaf2 0%, #ffffff 100%); color: var(--text-primary);
}
.extras-card.config .label { color: var(--amber); font-weight: 700; }
.extras-card.config .k { color: var(--violet); font-weight: 600; }
.extras-card.config .v { color: var(--teal); }
.extras-card.config .cm { color: var(--text-muted); font-style: italic; }
.extras-card.config .proxy { color: var(--cherry); font-weight: 600; }
.extras-card.config .direct { color: var(--green); font-weight: 600; }
.extras-card.config .sep { color: var(--rule); display: block; margin: 0.4rem 0; }

/* Slider widget (interactive) */
.slider-card {
  background: linear-gradient(to bottom, #fff5ea, #ffffff);
  border: 1px solid var(--rule); border-left: 3px solid var(--cherry);
  border-radius: 10px; padding: 0.9rem 1.1rem;
}
.slider-card h4 { font-size: 0.78rem; color: var(--cherry-deep); margin-bottom: 0.6rem; font-weight: 700; }
.slider-row { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.7rem; flex-wrap: wrap; }
.slider-row input[type=range] { flex: 1; min-width: 220px; accent-color: var(--cherry); }
.slider-row .label { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--cherry-deep); font-weight: 700; min-width: 130px; }
.slider-out { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; padding: 0.55rem 0.7rem; border-radius: 6px; background: #fff; border: 1px dashed var(--cherry-pink); line-height: 1.6; }
.slider-out .row { display: flex; gap: 0.7rem; flex-wrap: wrap; }
.slider-out .k { color: var(--text-muted); min-width: 70px; }
.slider-out .v-proxy { color: var(--cherry); font-weight: 700; }
.slider-out .v-direct { color: var(--green); font-weight: 700; }
.slider-out .v-rule { color: var(--violet); }

/* Details (expandable) */
details.extras-card { padding: 0.65rem 1.1rem; border-left: 3px solid var(--slate); }
details.extras-card summary {
  cursor: pointer; font-size: 0.8rem; font-weight: 600; color: var(--slate);
  list-style: none; display: flex; align-items: center; gap: 0.5rem;
}
details.extras-card summary::-webkit-details-marker { display: none; }
details.extras-card summary::before { content: '▸'; font-size: 0.7rem; transition: transform 0.2s ease; }
details.extras-card[open] summary::before { transform: rotate(90deg); }
details.extras-card .det-body { margin-top: 0.7rem; font-size: 0.8rem; line-height: 1.65; color: var(--text-primary); }
details.extras-card .det-body code { font-family: 'JetBrains Mono', monospace; font-size: 0.82em; background: var(--slate-soft); padding: 1px 4px; border-radius: 3px; }

.controls { display: flex; align-items: center; justify-content: center; gap: 0.6rem; flex-wrap: wrap; }
.controls button {
  background: var(--bg-card); border: 1px solid var(--rule); border-radius: 8px;
  padding: 8px 18px; font-family: inherit; font-size: 0.85rem; font-weight: 600;
  color: var(--text-primary); cursor: pointer; transition: all 0.15s ease;
}
.controls button:hover:not(:disabled) { border-color: var(--cherry); color: var(--cherry-deep); background: var(--cherry-glass); }
.controls button:disabled { opacity: 0.4; cursor: not-allowed; }
.controls button.primary { background: var(--cherry); color: white; border-color: var(--cherry); }
.controls button.primary:hover:not(:disabled) { background: var(--cherry-deep); }
.controls button.ghost { border: none; color: var(--text-muted); }
.controls .hint { font-size: 0.7rem; color: var(--text-muted); margin-left: 0.8rem; }

.svg-text { font-family: 'Noto Sans SC', sans-serif; }
.svg-mono { font-family: 'JetBrains Mono', monospace; }

.actor-cherry { fill: var(--cherry-glass); stroke: var(--cherry); }
.actor-teal   { fill: var(--teal-soft); stroke: var(--teal); }
.actor-red    { fill: var(--red-soft); stroke: var(--red-deep); }
.actor-violet { fill: var(--violet-soft); stroke: var(--violet); }
.actor-amber  { fill: var(--amber-soft); stroke: var(--amber); }
.actor-green  { fill: var(--green-soft); stroke: var(--green); }
.actor-slate  { fill: var(--slate-soft); stroke: var(--slate); }

.label-cherry { fill: var(--cherry-deep); }
.label-teal   { fill: var(--teal); }
.label-red    { fill: var(--red-deep); }
.label-violet { fill: var(--violet); }
.label-amber  { fill: var(--amber); }
.label-green  { fill: var(--green); }
.label-slate  { fill: var(--slate); }
.label-muted  { fill: var(--text-muted); }

@keyframes pulse-glow {
  0%, 100% { filter: drop-shadow(0 0 0 transparent); }
  50% { filter: drop-shadow(0 0 6px var(--cherry-soft)); }
}
.pulse { animation: pulse-glow 2.4s ease infinite; }

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sidebar { display: none; }
  .stage { padding: 1rem; }
}
@media (max-width: 600px) {
  .stage { padding: 0.7rem; gap: 0.7rem; }
  .header-title { font-size: 1rem; }
  .header-counter { width: 100%; text-align: right; }
  .caption-body { font-size: 0.82rem; }
  .extras-card { font-size: 0.78rem; }
  .slider-row .label { min-width: 100%; }
  .svg-wrap [data-mobile-hide] { display: none; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <a class="back-home" href="../index.html">← iostiny / doc</a>
    <div class="brand">🌐 VPN / 代理原理</div>
    <div class="brand-sub">零基础渐进教程 · 30 步</div>

    <div class="chap" data-ch="1">
      <div class="chap-name"><span class="num">CH1</span> 流量正常出门</div>

    <div class="chap" data-ch="2">

    </div>
    <div class="chap" data-ch="3">
      <div class="chap-name"><span class="num">CH3</span> TUN 虚拟网卡</div>

    <div class="chap" data-ch="4">
      <div class="chap-name"><span class="num">CH4</span> 分流是怎么做到的</div>
      <div class="dots" data-ch-dots="4"></div>
    </div>
    <div class="chap" data-ch="5">
      <div class="chap-name"><span class="num">CH5</span> DNS 的麻烦</div>
      <div class="dots" data-ch-dots="5"></div>
    </div>
    <div class="chap" data-ch="6">
      <div class="chap-name"><span class="num">CH6</span> 常见坑</div>
      <div class="dots" data-ch-dots="6"></div>
    </div>
    <div class="chap" data-ch="7">
      <div class="chap-name"><span class="num">CH7</span> 对照 + 真 VPN 辨析</div>
      <div class="dots" data-ch-dots="7"></div>
    </div>
  </aside>

  <main class="stage">
    <header class="header">
      <span class="header-ch" id="header-ch">CH1</span>
      <h1 class="header-title" id="header-title">流量正常出门</h1>
      <span class="header-counter" id="header-counter">Step 1 / 30</span>
    </header>

    <section class="svg-wrap">
<!-- ============== CH1 流量正常出门 ============== -->
      <svg class="chapter-svg" data-ch="1" viewBox="0 0 1100 520" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="ch1-arr-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
          </marker>
        </defs>

        <!-- Base flow PC → Router → ISP → Internet -->
        <g data-step="1">
          <rect x="40" y="200" width="120" height="100" rx="10" class="actor-cherry" stroke-width="2"/>
          <text x="100" y="244" text-anchor="middle" font-size="34">💻</text>
          <text x="100" y="290" text-anchor="middle" font-size="13" class="label-cherry" font-weight="700">你的电脑</text>

          <line x1="170" y1="250" x2="365" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#ch1-arr-slate)"/>

          <rect x="370" y="200" width="140" height="100" rx="10" class="actor-amber" stroke-width="2"/>
          <text x="440" y="244" text-anchor="middle" font-size="32">🏠</text>
          <text x="440" y="290" text-anchor="middle" font-size="13" class="label-amber" font-weight="700">路由器 / 网关</text>

          <line x1="520" y1="250" x2="695" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#ch1-arr-slate)"/>

          <rect x="700" y="200" width="120" height="100" rx="10" class="actor-teal" stroke-width="2"/>
          <text x="760" y="244" text-anchor="middle" font-size="32">📡</text>
          <text x="760" y="290" text-anchor="middle" font-size="13" class="label-teal" font-weight="700">运营商 ISP</text>

          <line x1="830" y1="250" x2="975" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#ch1-arr-slate)"/>

          <rect x="980" y="200" width="80" height="100" rx="10" class="actor-slate" stroke-width="2"/>
          <text x="1020" y="244" text-anchor="middle" font-size="32">🌐</text>
          <text x="1020" y="290" text-anchor="middle" font-size="12" class="label-slate" font-weight="700">互联网</text>
        </g>

        <!-- Step 2+: route table on top-left -->
        <g data-step="2">
          <rect x="40" y="50" width="500" height="118" rx="8" fill="#fff" stroke="#b45309" stroke-width="1.5"/>
          <text x="55" y="70" font-size="12" class="label-amber" font-weight="700">📋 你电脑里的路由表</text>
          <line x1="40" y1="76" x2="540" y2="76" stroke="#b45309" stroke-width="1"/>
          <text x="60" y="92" font-size="10.5" class="svg-mono label-muted">Destination</text>
          <text x="250" y="92" font-size="10.5" class="svg-mono label-muted">Gateway</text>
          <text x="430" y="92" font-size="10.5" class="svg-mono label-muted">Iface</text>
          <line x1="40" y1="98" x2="540" y2="98" stroke="#b45309" stroke-width="0.5"/>

          <text x="60" y="116" font-size="11.5" class="svg-mono" fill="#1f2937">default</text>
          <text x="250" y="116" font-size="11.5" class="svg-mono" fill="#1f2937">192.168.1.1</text>
          <text x="430" y="116" font-size="11.5" class="svg-mono" fill="#1f2937">en0</text>

          <text x="60" y="136" font-size="11.5" class="svg-mono" fill="#1f2937">192.168.1.0/24</text>
          <text x="250" y="136" font-size="11.5" class="svg-mono" fill="#1f2937">link</text>
          <text x="430" y="136" font-size="11.5" class="svg-mono" fill="#1f2937">en0</text>

          <text x="60" y="156" font-size="11.5" class="svg-mono" fill="#1f2937">127.0.0.0/8</text>
          <text x="250" y="156" font-size="11.5" class="svg-mono" fill="#1f2937">-</text>
          <text x="430" y="156" font-size="11.5" class="svg-mono" fill="#1f2937">lo0</text>

          <path d="M 100 168 L 100 200" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4 3"/>
        </g>

        <!-- Step 3 highlight default row -->
        <g data-step="3" data-step-end="3">
          <rect x="48" y="104" width="490" height="20" rx="4" fill="none" stroke="#aa1141" stroke-width="2.5"/>
          <text x="588" y="118" font-size="12" class="label-cherry" font-weight="700">← 兜底规则</text>
        </g>

        <!-- Step 4: NAT 翻译 -->
        <g data-step="4">
          <rect x="60" y="316" width="100" height="22" rx="4" fill="#fce4e4" stroke="#aa1141" stroke-width="1.2"/>
          <text x="110" y="332" text-anchor="middle" font-size="11" class="svg-mono label-cherry" font-weight="700">192.168.1.42</text>
          <text x="110" y="350" text-anchor="middle" font-size="9" class="label-muted">(内网 IP)</text>

          <text x="270" y="232" text-anchor="middle" font-size="10.5" class="svg-mono label-cherry">src=192.168.1.42</text>

          <rect x="390" y="316" width="100" height="22" rx="4" fill="#cffafe" stroke="#0e7490" stroke-width="1.2"/>
          <text x="440" y="332" text-anchor="middle" font-size="11" class="svg-mono label-teal" font-weight="700">203.0.113.27</text>
          <text x="440" y="350" text-anchor="middle" font-size="9" class="label-muted">(公网 IP)</text>

          <text x="610" y="232" text-anchor="middle" font-size="10.5" class="svg-mono label-teal">src=203.0.113.27</text>

          <text x="440" y="190" text-anchor="middle" font-size="11" class="label-amber" font-weight="700">SNAT · 改源 IP</text>
          <path d="M 290 232 Q 380 208 540 232" stroke="#b45309" stroke-width="1.3" stroke-dasharray="4 3" fill="none"/>
        </g>

        <!-- Step 5: conntrack table -->
        <g data-step="5">
          <rect x="565" y="370" width="500" height="120" rx="8" fill="#fff" stroke="#b45309" stroke-width="1.5"/>
          <text x="580" y="392" font-size="12" class="label-amber" font-weight="700">📒 路由器的 conntrack 翻译表</text>
          <line x1="565" y1="398" x2="1065" y2="398" stroke="#b45309" stroke-width="1"/>
          <text x="585" y="414" font-size="10" class="svg-mono label-muted">内网</text>
          <text x="800" y="414" font-size="10" class="svg-mono label-muted">↔  公网（路由器替你出去）</text>
          <line x1="565" y1="420" x2="1065" y2="420" stroke="#b45309" stroke-width="0.5"/>

'\n' +

  }

  ],
  details: {

    body:
'问自己一个问题：<strong>「不同 App 是否会走不同出口？」</strong><br><br>'+
'• 是 → 你用的是 Surge / Clash 这种<strong>代理工具</strong>（带规则引擎的本地拦截器）。<br>'+
'• 不是，所有流量都走同一条隧道到一个固定的对端 → 你用的是 <strong>真 VPN</strong>（WireGuard / OpenVPN / IPsec / iCloud Private Relay 的隧道层也属此类）。<br><br>'+

function chapterOf(step) {
  for (const c of CHAPTERS) if (step >= c.range[0] && step <= c.range[1]) return c;
  return CHAPTERS[0];
}

function renderDots() {
  for (const c of CHAPTERS) {
    const wrap = document.querySelector(`[data-ch-dots="${c.id}"]`);
    if (!wrap) continue;
    wrap.innerHTML = '';
    for (let n = c.range[0]; n <= c.range[1]; n++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.title = `Step ${n}`;
      if (n < current) d.classList.add('read');
      if (n === current) d.classList.add('active');
      d.addEventListener('click', () => goTo(n));
      wrap.appendChild(d);
    }
  }
}

function renderExtras(n) {
  const wrap = document.getElementById('extras');
  wrap.innerHTML = '';
  wrap.classList.remove('two-col');
  const ex = STEP_EXTRAS[n];
  if (!ex) return;
  const hasRefs = ex.refs && ex.refs.length;
  const hasShell = ex.shell;
  const hasConfig = ex.config;
  const hasSlider = ex.slider;
  const hasDetails = ex.details;

  if (hasRefs) {
    const c = document.createElement('div');
    c.className = 'extras-card refs';
    let html = '<h4>📚 参考 · 权威外链</h4><ul>';
    for (const r of ex.refs) {
      html += `<li><a href="${r.url}" target="_blank" rel="noopener">${r.title}</a>`;
      if (r.note) html += `<span class="ref-note">${r.note}</span>`;
      html += '</li>';
    }
    html += '</ul>';
    c.innerHTML = html;
    wrap.appendChild(c);
  }

  if (hasShell) {
    const c = document.createElement('div');
    c.className = 'extras-card shell';
    c.innerHTML = `<h4>🔧 终端实操 · ${ex.shell.title || ''}</h4><pre>${ex.shell.code}</pre>`;
    wrap.appendChild(c);
  }

  if (hasConfig) {
    const c = document.createElement('div');
    c.className = 'extras-card config';
    c.innerHTML = `<h4>⚙️ 配置对照 · ${ex.config.title || ''}</h4><pre>${ex.config.code}</pre>`;
    wrap.appendChild(c);
  }

  if (hasSlider) {
    const c = document.createElement('div');
    c.className = 'slider-card';
    c.innerHTML = ex.slider.html;
    wrap.appendChild(c);
    if (ex.slider.init) ex.slider.init(c);
  }

  if (hasDetails) {
    const d = document.createElement('details');
    d.className = 'extras-card';
    d.innerHTML = `<summary>${ex.details.title}</summary><div class="det-body">${ex.details.body}</div>`;
    wrap.appendChild(d);
  }

  // 两栏排版：refs + shell/config 任一组合
  if (hasRefs && (hasShell || hasConfig)) wrap.classList.add('two-col');
}

function goTo(n) {
  n = Math.max(1, Math.min(TOTAL, n));
  current = n;
  const step = STEPS[n - 1];
  const ch = chapterOf(n);

  document.getElementById('header-ch').textContent = `CH${ch.id}`;
  document.getElementById('header-title').textContent = ch.name;
  document.getElementById('header-counter').textContent = `Step ${n} / ${TOTAL}`;
  document.getElementById('caption-title').innerHTML = step.title;
  document.getElementById('caption-body').innerHTML = step.body;

  // toggle chapter SVG
  document.querySelectorAll('.chapter-svg').forEach(svg => {
    svg.classList.toggle('active', Number(svg.dataset.ch) === ch.id);
  });

  // toggle data-step elements
  document.querySelectorAll('[data-step]').forEach(el => {
    const start = Number(el.dataset.step);
    const end = el.dataset.stepEnd ? Number(el.dataset.stepEnd) : TOTAL;
    el.classList.toggle('visible', n >= start && n <= end);
  });

  renderExtras(n);
  renderDots();

  document.getElementById('btn-prev').disabled = (n === 1);
  document.getElementById('btn-next').disabled = (n === TOTAL);

  history.replaceState(null, '', `#step-${n}`);
}

document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));
document.getElementById('btn-replay').addEventListener('click', () => {
  const ch = chapterOf(current);
  goTo(ch.range[0]);
});
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') goTo(current - 1);
  if (e.key === 'ArrowRight') goTo(current + 1);
});
document.querySelectorAll('.chap').forEach(el => {
  el.addEventListener('click', () => {
    const ch = CHAPTERS.find(c => c.id === Number(el.dataset.ch));
    if (ch) goTo(ch.range[0]);
  });
});

// init from URL hash
const m = location.hash.match(/^#step-(\d+)$/);
goTo(m ? Number(m[1]) : 1);
</script>
